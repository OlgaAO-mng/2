<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Finance Architect — Интерактивный курс</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#09090f;--surface:#111218;--surface2:#171a24;--surface3:#1d2130;
  --border:#1c2035;--border2:#252d42;
  --gold:#c9a84c;--gold2:#e8cc7a;--gold-dim:rgba(201,168,76,.13);
  --cyan:#4ecdc4;--cyan-dim:rgba(78,205,196,.1);
  --red:#e05c5c;--green:#4ec994;--green-dim:rgba(78,201,148,.12);
  --blue:#5b8dee;--blue-dim:rgba(91,141,238,.1);
  --text:#e9eaf2;--text2:#9ba3bc;--text3:#525a75;
  --f1:'Playfair Display',serif;--f2:'Manrope',sans-serif;--f3:'JetBrains Mono',monospace;
  --r:10px;--shadow:0 8px 40px rgba(0,0,0,.7);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--f2);font-size:14px;line-height:1.6;min-height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
/* --- АДАПТАЦИЯ ДЛЯ МОБИЛЬНЫХ --- */
@media (max-width: 768px) {
    /* Фиксируем панель поверх контента на телефоне */
    .sidebar {
        position: fixed;
        left: -270px; /* Прячем меню влево */
        top: 0;
        bottom: 0;
        z-index: 1000;
        transition: left 0.3s ease;
        box-shadow: 2px 0 15px rgba(0,0,0,0.5);
    }
    
    /* Класс, который JS добавит при нажатии */
    .sidebar.active {
        left: 0;
    }

    /* Кнопка "гамбургер" */
    .menu-toggle {
        display: flex;
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 1001;
        background: var(--surface2);
        border: 1px solid var(--border);
        padding: 8px 12px;
        border-radius: 6px;
        color: var(--text2);
        font-family: var(--f3);
        cursor: pointer;
    }
}

/* На ПК кнопку скрываем */
@media (min-width: 769px) {
    .menu-toggle { display: none; }
}
  
/* SIDEBAR */
.sidebar{width:270px;min-width:270px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.s-head{padding:20px 16px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:var(--f1);font-size:16px;color:var(--gold);font-weight:700;line-height:1.2}
.logo span{display:block;font-family:var(--f3);font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.s-progress{margin:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.sp-top{display:flex;justify-content:space-between;font-family:var(--f3);font-size:10px;color:var(--text2);margin-bottom:6px}
.pb{background:var(--border2);border-radius:3px;height:3px;overflow:hidden;margin-bottom:5px}
.pb-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--cyan));border-radius:3px;transition:width .5s}
.sp-sub{font-family:var(--f3);font-size:10px;color:var(--text3)}
.nav{flex:1;overflow-y:auto;padding:6px 10px 16px}
.nav::-webkit-scrollbar{width:3px}.nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.nav-link{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;color:var(--text3);font-size:12px;font-weight:500;transition:all .15s;margin-bottom:1px}
.nav-link:hover{background:var(--surface2);color:var(--text2)}.nav-link.act{background:var(--gold-dim);color:var(--gold2)}
.nav-sep{height:1px;background:var(--border);margin:8px 4px}
.nav-lv{margin-bottom:4px}
.nav-lv-h{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:7px;cursor:pointer;color:var(--text3);font-family:var(--f3);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;transition:all .15s;user-select:none}
.nav-lv-h:hover{background:var(--surface2)}.nav-lv-h.open{color:var(--gold)}
.lv-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lv-arr{margin-left:auto;font-size:9px;transition:transform .2s}.lv-arr.open{transform:rotate(90deg)}
.nav-mods{display:none}.nav-mods.open{display:block}
.nav-mod{display:flex;align-items:center;gap:8px;padding:6px 8px 6px 26px;border-radius:7px;cursor:pointer;transition:all .15s;position:relative}
.nav-mod:hover{background:var(--surface2)}.nav-mod.act{background:var(--gold-dim);border:1px solid rgba(201,168,76,.2)}
.nm-n{font-family:var(--f3);font-size:9px;color:var(--text3);min-width:16px}
.nm-t{font-size:11px;color:var(--text2);flex:1;line-height:1.3}.nav-mod.act .nm-t{color:var(--gold2)}
.nm-chk{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:7px;flex-shrink:0;transition:all .2s}
.nm-chk.done{background:var(--green);border-color:var(--green);color:#000}

/* MAIN */
.main{flex:1;overflow-y:auto;background:var(--bg)}
.main::-webkit-scrollbar{width:4px}.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.page{padding:36px 44px;max-width:920px}

/* DASHBOARD */
.hero{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 40px;margin-bottom:28px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(201,168,76,.07) 0%,transparent 70%);pointer-events:none}
.hero-tag{display:inline-flex;align-items:center;gap:5px;background:var(--gold-dim);border:1px solid rgba(201,168,76,.25);border-radius:20px;padding:3px 11px;font-family:var(--f3);font-size:9px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px}
.hero h1{font-family:var(--f1);font-size:32px;font-weight:900;line-height:1.15;margin-bottom:10px;background:linear-gradient(130deg,var(--gold2),#fff 60%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--text2);font-size:14px;line-height:1.7;max-width:560px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.sc-n{font-family:var(--f1);font-size:28px;font-weight:700;color:var(--gold);line-height:1;margin-bottom:3px}
.sc-l{font-size:10px;color:var(--text3);font-family:var(--f3);letter-spacing:.5px}
.sec-title{font-family:var(--f1);font-size:20px;font-weight:700;color:var(--text);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* MODULE PAGE */
.mod-header{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px 32px;margin-bottom:20px;position:relative;overflow:hidden}
.mod-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--lc,var(--gold)),var(--cyan))}
.mod-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-family:var(--f3);font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;background:rgba(var(--lc-rgb,201,168,76),.12);border:1px solid rgba(var(--lc-rgb,201,168,76),.25);color:var(--lc,var(--gold))}
.mod-num{font-family:var(--f3);font-size:10px;color:var(--text3);margin-bottom:6px;letter-spacing:1px}
.mod-title{font-family:var(--f1);font-size:26px;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:8px}
.mod-goal{color:var(--text2);font-size:13px;line-height:1.7;max-width:660px}
.mod-meta{display:flex;gap:18px;margin-top:14px;flex-wrap:wrap}
.mm{display:flex;align-items:center;gap:5px;font-family:var(--f3);font-size:10px;color:var(--text3)}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:3px;margin-bottom:20px;overflow-x:auto;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tb{padding:7px 16px;border-radius:7px;cursor:pointer;background:none;border:none;color:var(--text3);font-family:var(--f2);font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap}
.tb:hover{color:var(--text2);background:var(--surface2)}.tb.act{background:var(--gold-dim);color:var(--gold2);border:1px solid rgba(201,168,76,.18)}
.tc{display:none}.tc.act{display:block}

/* CONTENT */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 26px;margin-bottom:14px}
.card h3{font-family:var(--f2);font-size:12px;font-weight:700;color:var(--gold);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:7px}
.lesson-text{color:var(--text2);font-size:13px;line-height:1.8}
.lesson-text h4{color:var(--text);font-weight:700;font-size:14px;margin:18px 0 8px;font-family:var(--f2)}
.lesson-text h4:first-child{margin-top:0}
.lesson-text p{margin-bottom:10px}
.lesson-text ul{margin:8px 0 12px 0;padding:0;list-style:none}
.lesson-text ul li{padding:5px 0 5px 18px;border-bottom:1px solid var(--border);font-size:13px;position:relative}
.lesson-text ul li:last-child{border-bottom:none}
.lesson-text ul li::before{content:'→';position:absolute;left:0;color:var(--gold);font-family:var(--f3);font-size:11px}
.lesson-text .formula{background:var(--surface2);border:1px solid var(--border2);border-left:3px solid var(--cyan);border-radius:0 6px 6px 0;padding:10px 16px;margin:12px 0;font-family:var(--f3);font-size:12px;color:var(--cyan)}
.lesson-text .tip{background:var(--gold-dim);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:12px 16px;margin:12px 0;color:var(--gold2);font-size:12px}
.lesson-text .warning{background:rgba(224,92,92,.08);border:1px solid rgba(224,92,92,.2);border-radius:8px;padding:12px 16px;margin:12px 0;color:var(--red);font-size:12px}

/* CASE STUDY */
.case-full{background:var(--surface2);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:16px 20px;margin-bottom:16px}
.case-title{font-weight:700;color:var(--text);font-size:14px;margin-bottom:8px}
.case-body{color:var(--text2);font-size:13px;line-height:1.7}
.workspace{margin-top:16px}
.ws-label{font-family:var(--f3);font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.ws-saved{color:var(--green);font-size:10px}
textarea.ws{width:100%;min-height:160px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:14px 16px;color:var(--text);font-family:var(--f2);font-size:13px;line-height:1.7;resize:vertical;outline:none;transition:border-color .2s}
textarea.ws:focus{border-color:var(--gold)}
textarea.ws::placeholder{color:var(--text3)}
.ws-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.btn{padding:8px 18px;border-radius:7px;font-family:var(--f2);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border:none;white-space:nowrap}
.btn-gold{background:linear-gradient(135deg,var(--gold),#9a7020);color:#000}
.btn-gold:hover{opacity:.9;transform:translateY(-1px)}
.btn-ghost{background:var(--surface2);border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-ai{background:var(--cyan-dim);border:1px solid rgba(78,205,196,.3);color:var(--cyan)}
.btn-ai:hover{background:rgba(78,205,196,.18)}
.btn-green{background:var(--green-dim);border:1px solid rgba(78,201,148,.3);color:var(--green)}

/* AI RESPONSE */
.ai-box{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:16px 20px;margin-top:14px;display:none}
.ai-box.show{display:block}
.ai-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-family:var(--f3);font-size:10px;color:var(--cyan);letter-spacing:1px;text-transform:uppercase}
.ai-content{color:var(--text2);font-size:13px;line-height:1.8;white-space:pre-wrap}
.ai-content h4{color:var(--text);font-weight:700;margin:12px 0 5px}
.loading-dots{display:inline-flex;gap:4px;align-items:center}
.loading-dots span{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:bounce .8s ease-in-out infinite}
.loading-dots span:nth-child(2){animation-delay:.15s}.loading-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* ASK AI */
.ask-ai-section{background:var(--surface);border:1px solid var(--cyan-dim);border-radius:var(--r);padding:20px 24px;margin-top:16px}
.ask-ai-section h3{color:var(--cyan);font-family:var(--f3);font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.ask-input-row{display:flex;gap:8px}
input.ask-inp{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:10px 14px;color:var(--text);font-family:var(--f2);font-size:13px;outline:none;transition:border-color .2s}
input.ask-inp:focus{border-color:var(--cyan)}
input.ask-inp::placeholder{color:var(--text3)}

/* COMPLETE */
.complete-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:20px;margin-top:24px}
.cb-info h4{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.cb-info p{font-size:12px;color:var(--text2)}
.btn-complete{padding:10px 24px;background:linear-gradient(135deg,var(--gold),#9a7020);border:none;border-radius:7px;color:#000;font-family:var(--f2);font-weight:700;font-size:13px;cursor:pointer;transition:all .2s}
.btn-complete:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(201,168,76,.3)}
.btn-complete.done{background:linear-gradient(135deg,var(--green),#2e8a5e)}

/* NAV ARROWS */
.mod-nav-row{display:flex;align-items:center;gap:8px;margin-bottom:22px}
.nav-arr{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s}
.nav-arr:hover{border-color:var(--border2);color:var(--text)}
.breadcrumb{display:flex;align-items:center;gap:6px;flex:1;font-size:12px}
.bc-item{color:var(--text3);cursor:pointer;font-family:var(--f3)}.bc-item:hover{color:var(--text2)}
.bc-sep{color:var(--text3);font-size:11px}
.bc-cur{color:var(--text2);font-family:var(--f3)}

/* LEVELS dash */
.lvl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:26px}
.lv-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.lv-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--lc,var(--gold))}
.lv-card:hover{transform:translateY(-2px)}
.lvc-tag{font-family:var(--f3);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;color:var(--lc,var(--gold))}
.lvc-title{font-family:var(--f1);font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
.lvc-desc{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.lvc-pct{font-family:var(--f1);font-size:22px;font-weight:700;color:var(--lc,var(--gold));position:absolute;top:14px;right:16px}

/* NOTIF */
.notif{position:fixed;bottom:22px;right:22px;background:var(--surface);border:1px solid var(--green);border-radius:var(--r);padding:12px 18px;font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px;z-index:9999;transform:translateX(130%);transition:transform .3s;box-shadow:var(--shadow)}
.notif.show{transform:translateX(0)}

/* TOOLS grid */
.tool-grid{display:flex;flex-wrap:wrap;gap:7px}
.tc-chip{background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:4px 11px;font-family:var(--f3);font-size:10px;color:var(--cyan)}

/* schedule */
.wk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.wk-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.wk-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.wk-card.wdone::before,.wk-card.wact::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.wk-card.wdone::before{background:var(--green)}.wk-card.wact::before{background:var(--gold)}
.wk-num{font-family:var(--f3);font-size:9px;color:var(--text3);letter-spacing:1px;margin-bottom:5px}
.wk-title{font-weight:700;font-size:12px;color:var(--text);margin-bottom:6px;line-height:1.3}
.wk-info{font-size:10px;color:var(--text3)}

/* UTIL */
.flex{display:flex}.items-center{align-items:center}.gap-2{gap:8px}.gap-3{gap:12px}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.text-gold{color:var(--gold)}.text-2{color:var(--text2)}.text-3{color:var(--text3)}
.font-mono{font-family:var(--f3)}

/* Monetize */
.mon-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.mon-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.mon-icon{font-size:26px;margin-bottom:8px}
.mon-title{font-weight:700;font-size:13px;color:var(--text);margin-bottom:4px}
.mon-range{font-family:var(--f3);font-size:13px;color:var(--gold);margin-bottom:6px}
.mon-desc{font-size:11px;color:var(--text2);line-height:1.5}

/* Resource cards */
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.res-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.res-badge{display:inline-block;font-family:var(--f3);font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px;margin-bottom:8px}
.res-name{font-weight:700;font-size:12px;color:var(--text);margin-bottom:3px}
.res-org{font-size:11px;color:var(--text2)}

/* File upload */
.file-upload-area{border:2px dashed var(--border2);border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;margin-top:10px}
.file-upload-area:hover{border-color:var(--gold);background:var(--gold-dim)}
.file-upload-area.has-file{border-color:var(--green);background:var(--green-dim)}
.fu-icon{font-size:24px;margin-bottom:6px}
.fu-text{font-size:12px;color:var(--text3)}
.fu-name{font-size:12px;color:var(--green);font-family:var(--f3);margin-top:4px}
input[type=file]{display:none}

/* Cert */
.cert-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px 32px;text-align:center;margin-bottom:14px}
.cert-icon{font-size:44px;margin-bottom:14px}
.cert-title{font-family:var(--f1);font-size:22px;color:var(--gold);margin-bottom:6px}
.cert-sub{font-size:14px;color:var(--text2);max-width:500px;margin:0 auto;line-height:1.7}
.cert-items{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:16px;text-align:left}
.ci{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:10px 14px}
.ci-name{font-weight:700;font-size:11px;color:var(--gold);margin-bottom:2px}
.ci-org{font-size:10px;color:var(--text3)}
</style>
</head>
<body>
  <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('active')">
        ☰ Меню
    </button>
<div class="app">
<div class="sidebar">
  <div class="s-head">
    <div class="logo">AI Finance Architect<span>CFO · AI · Consulting</span></div>
  </div>
  <div class="s-progress">
    <div class="sp-top"><span>Общий прогресс</span><span id="pctLabel">0%</span></div>
    <div class="pb"><div class="pb-fill" id="pbFill" style="width:0%"></div></div>
    <div class="sp-sub" id="cntLabel">0 / 20 модулей</div>
  </div>
  <div class="nav" id="nav"></div>
</div>
<div class="main">
  <div class="page" id="page"></div>

{id:'m01',level:'foundation',num:'01',week:1,title:'AI-грамотность для финансиста',goal:'Освоить экосистему AI-инструментов, научиться выбирать правильный инструмент под задачу и управлять рисками.',duration:'6ч',
lesson:`<h4>1.1 Почему AI меняет финансовую профессию прямо сейчас</h4>
<p>По данным McKinsey (2024), 60–70% задач финансового отдела поддаются частичной или полной автоматизации с помощью AI. Это не угроза — это рычаг. Финансист, умеющий работать с AI, стоит в 3–5 раз дороже на рынке и способен в одиночку выполнять работу небольшой команды.</p>
<p>Ключевые сдвиги 2024–2025:</p>
<ul>
<li>LLM перешли от "отвечать на вопросы" к "выполнять задачи" (Agentic AI)</li>
<li>Стоимость анализа документа снизилась с $10–50 (аналитик) до $0.01–0.10 (API вызов)</li>
<li>Порог входа: не нужно программировать — нужно уметь формулировать задачу</li>
<li>Казахстанский контекст: МФЦА, Astana Hub, рост IT-экспорта ставят AI-компетенцию в приоритет</li>
</ul>
<h4>1.2 Архитектура современных LLM (без лишней теории)</h4>
<p>Тебе не нужно знать, как работает трансформер. Нужно понять три вещи:</p>
<ul>
<li><strong>Контекстное окно</strong> — это "рабочий стол" модели. Claude: 200K токенов ≈ 150 страниц текста. Используй для загрузки целых отчётов.</li>
<li><strong>Температура</strong> — "креативность" модели. Для анализа цифр ставь низкую (0.1–0.3), для написания текстов — среднюю (0.5–0.7).</li>
<li><strong>Hallucination</strong> — модель может уверенно "придумать" цифры. Никогда не используй AI-ответ с числами без верификации первоисточником.</li>
</ul>
<div class="warning">⚠️ Критическое правило: Любую цифру, выданную LLM, проверяй в первоисточнике. AI — аналитик, не источник данных.</div>
<h4>1.3 Сравнение моделей для финансовых задач</h4>
<ul>
<li><strong>Claude 3.7 Sonnet</strong> — лучший для анализа документов, написания отчётов, работы с большими контекстами (договора, финотчётность). Точен, осторожен.</li>
<li><strong>GPT-4o</strong> — хорош для Data Analysis (встроенный Code Interpreter), работы с таблицами, создания графиков прямо в диалоге.</li>
<li><strong>Gemini 1.5 Pro</strong> — интегрирован в Google Workspace. Лучший выбор, если работаешь в Sheets/Docs/Gmail.</li>
<li><strong>Perplexity</strong> — для быстрого поиска с источниками. Удобен для мониторинга новостей, ставок, регуляторики.</li>
</ul>
<h4>1.4 Prompt Engineering для финансиста</h4>
<p>Промпт = задание для умного стажёра. Чем чётче ТЗ, тем лучше результат.</p>
<div class="formula">ФОРМУЛА ФИНАНСОВОГО ПРОМПТА:
Роль + Контекст + Задача + Формат + Ограничения

Пример: "Ты — CFO производственной компании. 
Вот P&L за Q1-Q3 [данные]. 
Найди топ-3 статьи роста расходов, 
объясни причины и дай рекомендации.
Ответ в виде таблицы + 3 абзаца резюме.
Не делай предположений без данных."</div>
<p>Три техники, которые работают:</p>
<ul>
<li><strong>Chain-of-Thought:</strong> "Думай пошагово" — просишь модель показать логику рассуждений</li>
<li><strong>Few-Shot:</strong> Даёшь 2–3 примера нужного формата ответа перед основным запросом</li>
<li><strong>Role Prompting:</strong> Задаёшь роль — "Ты — опытный CFO с 20 лет опытом в ритейле"</li>
</ul>
<h4>1.5 Безопасность финансовых данных в AI</h4>
<p>Правила работы с конфиденциальными данными:</p>
<ul>
<li>Никогда не загружай реальные данные клиентов в публичные AI (ChatGPT, Claude.ai) без согласия</li>
<li>Используй анонимизацию: замени названия компаний, суммы округли до порядков</li>
<li>Для чувствительных данных: локальные модели (Ollama + Llama) или корпоративные тарифы (Claude Teams, GPT Enterprise)</li>
<li>Казахстанский закон 094-V: персональные данные должны обрабатываться на серверах РК или с соответствующим соглашением</li>
</ul>
<div class="tip">💡 Лайфхак: Создай "Prompt Library" в Notion — папку с готовыми промптами для твоих типовых задач. Это сэкономит часы каждую неделю.</div>`,

{id:'m02',level:'foundation',num:'02',week:1,title:'Google Sheets + AI: Финансовые системы',goal:'Построить автоматизированную финансовую систему в Google Sheets с AI-интеграцией.',duration:'8ч',
lesson:`<h4>2.1 Google Sheets как финансовое ядро МСБ</h4>
<p>Для большинства казахстанских компаний до 300 сотрудников Google Sheets — оптимальный инструмент управленческого учёта. Главные причины: нулевая стоимость, работа на любом устройстве, встроенный AI (Gemini), коллаборация в реальном времени, интеграция с 2000+ сервисов через Make/Zapier.</p>
<h4>2.2 Архитектура финансовой системы в Sheets</h4>
<p>Принцип "Single Source of Truth": данные вводятся один раз, всё остальное — расчёты.</p>
<ul>
<li><strong>Raw Data листы:</strong> Операции, Сотрудники, Поставщики, Товары — только ввод данных</li>
<li><strong>Reference листы:</strong> Справочники, План счётов, Нормативы — константы</li>
<li><strong>Calculation листы:</strong> P&L, Баланс, Cash Flow — формулы, никакого ручного ввода</li>
<li><strong>Dashboard листы:</strong> Только визуализация расчётных данных</li>
</ul>
<div class="formula">Правило: Если ты вводишь цифру вручную в Calculation лист — архитектура неправильная.</div>
<h4>2.3 Продвинутые формулы для управленческого учёта</h4>
<ul>
<li><strong>QUERY</strong> — SQL-подобные запросы к данным: <code>=QUERY(Операции!A:G,"SELECT B,SUM(D) WHERE C='Выручка' GROUP BY B LABEL SUM(D) 'Итого'")</code></li>
<li><strong>ARRAYFORMULA</strong> — применяет формулу к целому столбцу без копирования</li>
<li><strong>IMPORTRANGE</strong> — объединяет данные из разных файлов (5 магазинов → 1 консолидация)</li>
<li><strong>FILTER + SORT</strong> — динамические срезы без сводных таблиц</li>
</ul>
<h4>2.4 Apps Script: Автоматизация финансовых процессов</h4>
<p>Apps Script — JavaScript внутри Google Workspace. Не нужно быть программистом — с Claude можно написать любой скрипт за 5 минут.</p>
<ul>
<li>Автоматическая отправка отчёта на email каждую пятницу в 18:00</li>
<li>Уведомление в Telegram при превышении статьи расходов</li>
<li>Автоматическое создание нового листа в начале месяца</li>
<li>Импорт курсов валют из API Нацбанка РК каждое утро</li>
</ul>
<div class="tip">💡 Как использовать Claude для Apps Script: "Напиши Google Apps Script, который каждый понедельник в 9:00 берёт данные с листа P&L строки 5-15 столбцы A-D и отправляет их на email director@company.kz в формате HTML таблицы"</div>
<h4>2.5 Gemini в Google Sheets</h4>
<p>С тарифом Google Workspace Business Standard доступна функция Help me analyze — Gemini анализирует твою таблицу по запросу на естественном языке. Пример: "Найди аномалии в расходах за последние 3 месяца и предложи объяснения". Результат — прямо в Sheets с ссылками на конкретные строки.</p>`,

{id:'m03',level:'foundation',num:'03',week:2,title:'Excel Copilot & Power BI для CFO',goal:'Освоить Microsoft AI-стек для корпоративной финансовой аналитики.',duration:'8ч',
lesson:`<h4>3.1 Excel Copilot: Новая парадигма работы с данными</h4>
<p>Excel Copilot (доступен в Microsoft 365) позволяет анализировать данные на естественном языке прямо в таблице. Ключевые возможности:</p>
<ul>
<li>Автоматическое создание сводных таблиц по текстовому описанию</li>
<li>Генерация сложных формул (DAX, Excel) по описанию задачи</li>
<li>Python в Excel (2024): запуск pandas/matplotlib прямо в ячейках</li>
<li>Анализ трендов и аномалий без формул — "найди выбросы в столбце D"</li>
</ul>
<div class="formula">Практика: Загрузи выгрузку из 1С (1000+ строк).
Скажи Copilot: "Создай сводную таблицу выручки по месяцам и категориям, 
добавь колонку с долей каждой категории, выдели топ-3 по росту."
Результат за 10 секунд вместо 20 минут.</div>
<h4>3.2 Power Query: ETL для финансистов</h4>
<p>Power Query — инструмент трансформации данных. Основной use case для CFO: объединить выгрузки из разных систем (1С, Excel-файлы от подразделений, банковские выписки) в единый очищенный набор данных.</p>
<ul>
<li>Автоматическое удаление дубликатов и пустых строк</li>
<li>Приведение форматов дат/сумм из разных источников</li>
<li>Объединение таблиц (Merge/Append) без формул VLOOKUP</li>
<li>Расписание обновления: каждый день в 7:00 данные свежие</li>
</ul>
<h4>3.3 Power BI: От данных к решениям</h4>
<p>Power BI — Microsoft-стандарт корпоративной аналитики. В Казахстане используется в банках, крупных холдингах, торговых сетях. Для CFO ключевые навыки:</p>
<ul>
<li><strong>DAX формулы</strong> — язык расчётов. Ключевые для финансов: CALCULATE, SUMX, DIVIDE, PREVIOUSMONTH, YTD, SAMEPERIODLASTYEAR</li>
<li><strong>Relationships</strong> — связи между таблицами (как в базе данных)</li>
<li><strong>Row-level security</strong> — директор видит всё, менеджер — только свой регион</li>
</ul>
<div class="formula">Ключевые DAX для финансиста:
Gross Margin % = DIVIDE([Gross Profit],[Revenue],0)
YTD Revenue = TOTALYTD(SUM(Sales[Amount]),Calendar[Date])
vs LY = CALCULATE([Revenue],SAMEPERIODLASTYEAR(Calendar[Date]))</div>
<h4>3.4 Copilot в Power BI</h4>
<p>С Copilot в Power BI можно задавать вопросы к дашборду на русском: "Покажи динамику EBITDA по кварталам с объяснением основных изменений". Copilot генерирует визуализацию и нарратив автоматически. Это меняет роль аналитика: от "строить графики" к "интерпретировать результаты".</p>`,

{id:'m04',level:'foundation',num:'04',week:2,title:'No-code автоматизация: Make, n8n, Zapier',goal:'Построить финансовые автоматизации без программирования.',duration:'7ч',
lesson:`<h4>4.1 Зачем автоматизировать финансовые процессы</h4>
<p>Типичный финансовый отдел МСБ тратит 60–70% времени на рутину: перенос данных, отправка напоминаний, сверки, формирование одних и тех же отчётов. Это дорого и создаёт ошибки человеческого фактора.</p>
<p>Правило 3D: если задача Dumb (простая), Dull (скучная) и Done repeatedly (повторяется) — её должен делать робот.</p>
<h4>4.2 Make (Integromat): Главный инструмент</h4>
<p>Make — визуальный конструктор автоматизаций. Модули (приложения) соединяются как конструктор Lego. Бесплатный тариф: 1000 операций/месяц — достаточно для старта.</p>
<ul>
<li><strong>Trigger</strong> — что запускает сценарий (новое письмо, новая строка в таблице, время)</li>
<li><strong>Action</strong> — что делаем (создать запись, отправить сообщение, сделать расчёт)</li>
<li><strong>Router</strong> — ветвление логики (если сумма > 1M ₸ → уведомить CFO, иначе → просто записать)</li>
<li><strong>Iterator</strong> — цикл по массиву данных</li>
</ul>
<div class="formula">Пример сценария автоконтроля расходов:
1. Trigger: Новая строка в Sheets "Расходы"
2. Router: Сумма > лимита категории?
   ДА → Telegram уведомление CFO + запись в "Нарушения"
   НЕТ → просто продолжить
3. Action: Обновить баланс категории в бюджете</div>
<h4>4.3 n8n: Self-hosted для конфиденциальных данных</h4>
<p>n8n — опенсорс аналог Make, который ты запускаешь на своём сервере (Oracle Cloud Free Tier стоит $0). Важно для финансовых данных: данные не покидают твой контур.</p>
<p>n8n лучше Make когда: данные конфиденциальны, нужен AI-агент с кастомной логикой, много вызовов API (нет лимитов).</p>
<h4>4.4 OCR + AI: Автоматизация первичных документов</h4>
<p>Ручной ввод счетов, накладных, чеков — это 2–4 часа в день для небольшой компании. OCR + AI решает это за секунды.</p>
<ul>
<li><strong>Nanonets</strong> — лучший для накладных и счетов-фактур, обучается на твоих данных</li>
<li><strong>Mindee</strong> — API первого класса, хорошо работает с казахстанскими форматами</li>
<li><strong>Google Document AI</strong> — интегрирован в Workspace, понимает таблицы в PDF</li>
<li><strong>Claude Vision</strong> — загружаешь фото накладной, просишь извлечь поставщика/сумму/дату/НДС</li>
</ul>
<div class="tip">💡 Самый простой старт: пересылай фото чека в Telegram бота → бот через Claude Vision извлекает сумму и категорию → записывает в Google Sheets. Это можно настроить за 2 часа.</div>`,
cases:[
{title:'Кейс: Автоматический учёт расходов через Telegram',
body:`Задача: Спроектируй систему автоматического учёта расходов компании через Telegram.

Требования:
- Сотрудник фотографирует чек/накладную → отправляет в Telegram бот
- Система автоматически извлекает: дату, поставщика, сумму, НДС
- Категоризирует расход (топливо/канцтовары/питание/и т.д.)
- Сравнивает с лимитом по категории за месяц
- Если лимит превышен — уведомляет руководителя
- Всё записывается в Google Sheets

Опиши:
1. Схему Make-сценария (все шаги/модули)
2. Промпт для Claude Vision для извлечения данных из чека
3. Логику категоризации
4. Структуру Google Sheets таблицы
5. Текст Telegram уведомлений`,

{id:'m05',level:'foundation',num:'05',week:3,title:'Финансовый учёт + AI',goal:'Автоматизировать первичный учёт и формирование отчётности с помощью AI.',duration:'7ч',
lesson:`<h4>5.1 Где AI помогает в финансовом учёте</h4>
<p>AI не заменяет бухгалтера — AI убирает механическую часть работы. Три зоны наибольшего эффекта:</p>
<ul>
<li><strong>Ввод первичных документов:</strong> OCR + автоматическая разноска по счетам (экономия 2–4 ч/день)</li>
<li><strong>Сверки:</strong> автоматическое сопоставление банка, поставщиков, склада (экономия 8–16 ч/месяц)</li>
<li><strong>Отчётность:</strong> генерация пояснительных записок, нарративов, ответов на запросы (экономия 4–8 ч/квартал)</li>
</ul>
<h4>5.2 Умная категоризация операций</h4>
<p>Задача: у тебя 500 банковских операций в месяц. Нужно каждую отнести к статье учёта. Раньше — руками. Теперь:</p>
<ol>
<li>Берёшь историческую выборку: 200 операций с уже расставленными категориями</li>
<li>Составляешь промпт-few-shot: "Вот примеры категоризации [200 строк]. Теперь категоризируй эти [500 строк]"</li>
<li>Точность: 85–92% для типичных операций</li>
<li>Исключения (8–15%) — проверяешь вручную</li>
</ol>
<div class="formula">Промпт-шаблон для категоризации:
"Ты — бухгалтер. Вот план счётов: [список категорий].
Вот 10 примеров правильной категоризации: [примеры].
Категоризируй следующие транзакции. 
Формат: №строки | Категория | Уверенность (высокая/средняя/низкая).
Если уверенность низкая — поставь флаг 'ТРЕБУЕТ ПРОВЕРКИ'."</div>
<h4>5.3 Автоматическая банковская сверка</h4>
<p>Алгоритм автоматической сверки банковской выписки с учётной системой:</p>
<ul>
<li>Загружаем банковскую выписку (CSV из интернет-банка) и данные учётной системы</li>
<li>MATCH по: дате (±1 день), сумме (точное совпадение), контрагенту (fuzzy matching)</li>
<li>Несопоставленные строки — AI анализирует причину: дублирование? техническая ошибка? забытая транзакция?</li>
<li>Результат: список расхождений с вероятной причиной и рекомендацией</li>
</ul>
<h4>5.4 AI-пояснительная записка к отчётности</h4>
<p>Казахстанские требования: к квартальной отчётности часто нужна пояснительная записка. Занимало 4–8 часов. Теперь:</p>
<ul>
<li>Загружаешь P&L, Баланс, CF за период</li>
<li>Промпт: "Составь пояснительную записку для налоговой/аудиторов в соответствии с МСФО. Объясни ключевые изменения, укажи причины отклонений. Тон — профессиональный, нейтральный."</li>
<li>Время: 10–15 минут вместо полного рабочего дня</li>
</ul>
<div class="tip">💡 Важно: AI-текст всегда редактируй и проверяй перед подачей. Используй его как черновик, не как финальный документ для регулятора.</div>
<h4>5.5 Интеграция с казахстанскими системами</h4>
<ul>
<li><strong>IS ESF (ИС ЭСФ)</strong> — электронные счета-фактуры. API позволяет автоматически скачивать входящие ЭСФ и разносить в учёт</li>
<li><strong>Kaspi Business API</strong> — автоматический импорт Kaspi Pay транзакций</li>
<li><strong>Halyk/Forte/Jusan API</strong> — банковские выписки без ручной выгрузки</li>
</ul>`,

{id:'m06',level:'intermediate',num:'06',week:4,title:'Управленческий учёт нового поколения',goal:'Выстроить систему управленческого учёта с AI-слоем от данных до решений.',duration:'9ч',
lesson:`<h4>6.1 Управленческий учёт vs Финансовый учёт</h4>
<p>Финансовый учёт — для регулятора и налоговой. Управленческий учёт — для принятия решений. Главное отличие: управленческий учёт должен давать ответ на вопрос "Почему?" и "Что делать?" — а не просто "Сколько?".</p>
<p>Три уровня управленческой информации:</p>
<ul>
<li><strong>Операционный (ежедневно):</strong> выручка, трафик, средний чек, food cost (для HoReCa), явка персонала</li>
<li><strong>Тактический (еженедельно):</strong> P&L, Cash Flow, KPI по подразделениям, план-факт</li>
<li><strong>Стратегический (ежемесячно):</strong> Unit Economics, трендовый анализ, сценарии, инвестиционные решения</li>
</ul>
<h4>6.2 Unit Economics: Считаем правильно</h4>
<p>Unit Economics — это прибыльность одной единицы бизнеса (клиента, транзакции, заказа). Без этого невозможно масштабировать.</p>
<div class="formula">Ключевые метрики:
LTV (Lifetime Value) = Средний чек × Частота покупок × Срок жизни клиента × Gross Margin
CAC (Cost of Acquisition) = Маркетинговые расходы / Количество новых клиентов
LTV/CAC ratio > 3 = здоровый бизнес
Payback Period = CAC / (Средний чек × Gross Margin % × Частота/мес)</div>
<h4>6.3 Себестоимость продукции с AI</h4>
<p>Для производства и HoReCa расчёт себестоимости — критический процесс. AI-автоматизация:</p>
<ul>
<li>Технологические карты в Google Sheets: при изменении цены ингредиента — все блюда пересчитываются автоматически</li>
<li>AI рекомендует цену продажи: "При food cost 32% и желаемой марже 65%, цена должна быть X"</li>
<li>Автоматическое сравнение плановой и фактической себестоимости — выявление пересорта, воровства</li>
</ul>
<h4>6.4 Управление запасами: ABC + AI прогноз</h4>
<ul>
<li><strong>ABC-анализ:</strong> A — 20% позиций = 80% оборота, B — 30% = 15%, C — 50% = 5%</li>
<li><strong>XYZ-анализ:</strong> X — стабильный спрос, Y — сезонный, Z — нерегулярный</li>
<li>Оптимальный запас = Среднедневной расход × Срок поставки × Коэффициент безопасности</li>
<li>AI-прогноз: Prophet или ARIMA на истории продаж → автоматическое предложение заказа</li>
</ul>
<h4>6.5 Контроль кассы в реальном времени</h4>
<p>Типичные схемы злоупотреблений в рознице: недопробивание, возвраты без товара, сговор с кассиром. AI-мониторинг:</p>
<ul>
<li>Паттерн-анализ: аномально высокое число отмен/возвратов у конкретного кассира</li>
<li>Сравнение оборота по времени суток с плановым — резкие падения = подозрение</li>
<li>Сверка физического остатка с расчётным в конце смены</li>
</ul>`,

Данные за последние 6 месяцев:

{id:'m07',level:'intermediate',num:'07',week:4,title:'AI-Бюджетирование и финансовое планирование',goal:'Построить современную систему бюджетирования с AI-ассистентом и сценарным анализом.',duration:'9ч',
lesson:`<h4>7.1 Современные подходы к бюджетированию</h4>
<p>Традиционный бюджет: раз в год, снизу вверх, Excel файлы летают по почте. Результат: устарел к моменту утверждения. Современный подход — Driver-Based Planning + Rolling Forecast.</p>
<ul>
<li><strong>Zero-Based Budgeting (ZBB):</strong> каждый год начинаем с нуля, каждая статья должна быть обоснована. AI помогает анализировать обоснования и выявлять неэффективность.</li>
<li><strong>Driver-Based Planning:</strong> бюджет строится от ключевых драйверов (количество клиентов × средний чек вместо "выручка"), AI определяет драйверы автоматически</li>
<li><strong>Rolling Forecast:</strong> всегда актуальный прогноз на 12 месяцев вперёд, обновляется при получении факта</li>
</ul>
<h4>7.2 Сценарное планирование с AI</h4>
<p>Три обязательных сценария:</p>
<ul>
<li><strong>Base Case:</strong> наиболее вероятный исход, консервативные допущения</li>
<li><strong>Bull Case (оптимистичный):</strong> всё идёт хорошо: рост рынка +20%, новые клиенты, снижение затрат</li>
<li><strong>Bear Case (пессимистичный):</strong> девальвация KZT на 20%, потеря ключевого клиента, рост COGS</li>
</ul>
<p>AI-роль в сценарном планировании: Claude помогает формулировать допущения, проверяет внутреннюю логику сценария, генерирует нарратив ("Почему этот сценарий реалистичен").</p>
<div class="formula">Driver-Based Revenue Model:
Выручка = Кол-во активных клиентов × Частота покупки/мес × Средний чек
Где каждый драйвер имеет свою модель изменения:
- Клиенты: текущие + новые - ушедшие (churn)
- Частота: сезонный коэффициент × тренд
- Чек: инфляция × mix shift</div>
<h4>7.3 Monte Carlo симуляция для CFO</h4>
<p>Monte Carlo — метод моделирования неопределённости. Запускаем 10,000 симуляций с случайными значениями ключевых переменных и смотрим распределение результатов.</p>
<ul>
<li>Вместо "выручка будет 100M ₸" получаем: "с вероятностью 80% выручка будет в диапазоне 87–115M ₸"</li>
<li>Можно реализовать в Python (numpy), Excel или Google Sheets</li>
<li>Показывает совету директоров реальную картину неопределённости</li>
</ul>

<p>Классическая боль: 10 подразделений присылают Excel с бюджетными заявками в разных форматах. AI-решение:</p>
<ul>
<li>Стандартная Google Form → Sheets → автоматическая проверка корректности заполнения</li>
<li>AI сравнивает заявку с прошлым годом: "Статья 'представительские расходы' выросла на 340% — требуется обоснование"</li>
<li>Автоматическая консолидация и выявление противоречий между подразделениями</li>
</ul>`,

{id:'m08',level:'intermediate',num:'08',week:5,title:'Plan-Fact анализ с AI',goal:'Создать систему план-факт анализа с автодиагностикой и рекомендациями.',duration:'8ч',
lesson:`<h4>8.1 Архитектура план-факт системы</h4>
<p>План-факт анализ — это не просто сравнение цифр. Это управленческий инструмент: что случилось → почему → что делать.</p>
<p>Три уровня план-факта:</p>
<ul>
<li><strong>Контрольный (еженедельно):</strong> 5–7 KPI, светофор, быстрый обзор для руководителя</li>
<li><strong>Аналитический (ежемесячно):</strong> полный P&L, декомпозиция отклонений, root cause</li>
<li><strong>Стратегический (ежеквартально):</strong> ревизия бюджета, пересмотр прогнозов</li>
</ul>
<h4>8.2 Variance Analysis: Декомпозиция отклонений</h4>
<div class="formula">Отклонение выручки = Ценовой эффект + Объёмный эффект + Структурный эффект

Ценовой эффект = (Факт. цена - Плановая цена) × Факт. объём
Объёмный эффект = (Факт. объём - Плановый объём) × Плановая цена  
Структурный эффект = изменение микса продуктов/каналов</div>
<p>AI-роль: автоматически применяет формулы декомпозиции и генерирует вывод на русском языке. Пример: "Снижение выручки на 8.5M ₸ обусловлено преимущественно объёмным эффектом (-6.2M ₸), что связано с сокращением трафика. Ценовой эффект незначительный (+0.3M ₸)."</p>
<h4>8.3 Root Cause Analysis с AI</h4>
<p>RCA — поиск первопричины, а не симптома. Метод 5 Почему в финансах:</p>
<ul>
<li>Выручка ниже плана на 12% → Почему? Снизился средний чек (-8%) и трафик (-4%)</li>
<li>Средний чек снизился → Почему? Клиенты чаще покупают бюджетные позиции</li>
<li>Переключение на бюджет → Почему? Конкурент запустил промо -20% в марте</li>
<li>Мы не ответили на промо → Почему? Нет оперативной системы мониторинга конкурентов</li>
<li>Нет мониторинга → Почему? Не выстроен процесс конкурентной разведки</li>
</ul>
<p>AI-промпт для RCA: "Вот отклонения факта от плана по 10 статьям P&L [данные]. Для каждого существенного отклонения (>5%) проведи анализ 5 Почему и предложи 2–3 корректирующих действия."</p>
<h4>8.4 Автоматический нарратив отчёта</h4>
<p>Шаблон для AI-генерации ежемесячного управленческого комментария:</p>
<div class="formula">Промпт:
"Ты — CFO. Вот P&L за [месяц]: [данные].
Для сравнения план: [данные] и прошлый год: [данные].
Напиши управленческий комментарий (300–400 слов):
1. Краткое резюме (2 предложения)
2. Ключевые достижения (2–3 пункта)
3. Проблемные зоны с объяснением причин (2–3 пункта)
4. Приоритетные действия на следующий месяц (3 пункта)
Тон: профессиональный, прямой, без воды."</div>`,
cases:[
{title:'Кейс: Диагностика падения EBITDA',
body:`Производственная компания "КазПласт" — план-факт за октябрь:

{id:'m09',level:'intermediate',num:'09',week:6,title:'AI для SMB: Практика по отраслям',goal:'Разработать тиражируемые AI-финансовые решения для 4 ключевых отраслей МСБ.',duration:'10ч',
lesson:`<h4>9.1 HoReCa: Самая управляемая отрасль</h4>
<p>В ресторанном бизнесе 90% успеха — операционный контроль. AI меняет три ключевых процесса:</p>

<li><strong>Food Cost Control:</strong> ежедневный расчёт фактического food cost на основе Z-отчёта и данных склада. Отклонение >2% от норматива = немедленный сигнал (воровство / пересорт / потери)</li>
<li><strong>Menu Engineering:</strong> матрица Stars/Plowhorses/Puzzles/Dogs для каждой позиции меню. AI анализирует данные POS и рекомендует: что продвигать, что убрать, как изменить цену</li>
<li><strong>Labour Scheduling:</strong> AI-прогноз посещаемости по дням/часам → оптимальный график персонала → экономия ФОТ 8–15%</li>
</ul>
<div class="formula">Ресторанный KPI дашборд (ежедневно):
1. Выручка факт vs план vs прошлая неделя
2. Food Cost % (норматив 28–32% для казахстанского casual dining)
3. Labour Cost % (норматив 25–30%)
4. Prime Cost = Food Cost + Labour Cost (должен быть < 60%)
5. Средний чек + трафик гостей</div>
<h4>9.2 Розница: Ассортимент и ценообразование</h4>
<ul>
<li><strong>Динамическое ценообразование:</strong> AI анализирует конкурентов (скрейпинг), эластичность спроса, остатки → предлагает оптимальную цену. Рост маржи 3–7%.</li>

{id:'m10',level:'intermediate',num:'10',week:6,title:'KPI-системы и AI-дашборды',goal:'Спроектировать иерархическую KPI-систему с AI-мониторингом.',duration:'8ч',
lesson:`<h4>10.1 KPI-дерево: от стратегии до операций</h4>
<p>KPI без стратегии — это просто числа. Правильная архитектура: стратегическая цель → факторы успеха → KPI → операционные метрики.</p>
<div class="formula">Пример KPI-дерева для ритейла:
Стратегическая цель: Рост EBITDA +25% за год
→ Выручка +20%
   → Трафик +10% [метрика: посетители/день]
   → Конверсия +3пп [метрика: % купивших]
   → Средний чек +7% [метрика: ₸/чек]
→ Gross Margin +2пп
   → Оптимизация закупок [метрика: цена vs рынок]
   → Снижение потерь [метрика: shrinkage %]
→ OPEX/Выручка -3пп
   → Labour productivity [метрика: выручка/FTE]</div>
<h4>10.2 Правила хорошего KPI</h4>
<ul>
<li><strong>Measurable:</strong> конкретное число, не "улучшить" а "вырасти с X до Y"</li>
<li><strong>Actionable:</strong> команда может влиять на этот показатель</li>
<li><strong>Timely:</strong> обновляется достаточно часто для принятия решений</li>
<li><strong>Not gamed:</strong> не создаёт стимулов к манипуляциям</li>
</ul>
<p>Антипаттерны: слишком много KPI (>7 для любого уровня), KPI которые команда не понимает, отсутствие связи между KPI разных уровней.</p>
<h4>10.3 Real-time KPI мониторинг</h4>
<p>Стек для real-time мониторинга (бесплатный вариант для МСБ):</p>
<ul>
<li>Данные → Google Sheets (обновляются через Make/Apps Script)</li>
<li>Визуализация → Looker Studio (бесплатно, подключается к Sheets)</li>
<li>Алерты → Make сценарий: если KPI нарушил порог → Telegram уведомление</li>
<li>AI-комментарий → Claude API генерирует объяснение аномалии</li>
</ul>
<h4>10.4 Anomaly Detection в KPI</h4>
<p>Простые методы обнаружения аномалий без ML:</p>
<ul>
<li><strong>Z-score:</strong> если значение отклоняется от среднего на >2σ — аномалия (применимо к стабильным рядам)</li>
<li><strong>Процентное отклонение:</strong> если KPI отклонился от плана или прошлого периода на X%</li>
<li><strong>Последовательность:</strong> 3 подряд периода ниже плана — тренд, требующий внимания</li>
</ul>`,

{id:'m11',level:'advanced',num:'11',week:7,title:'Финансовый контроль и AI-аудит',goal:'Выстроить систему непрерывного финансового контроля с AI-мониторингом 100% операций.',duration:'9ч',
lesson:`<h4>11.1 От выборочного к непрерывному аудиту</h4>
<p>Традиционный внутренний аудит: 1–2 раза в год, выборка 5–10% транзакций, задержка обнаружения проблем 6–18 месяцев. Continuous Auditing с AI: мониторинг 100% транзакций в режиме реального времени, выявление аномалий за часы.</p>
<h4>11.2 Benford's Law: Математическая детекция манипуляций</h4>
<p>Закон Бенфорда: в реальных финансовых данных первая цифра распределяется не равномерно. Цифра 1 встречается в 30% случаев, цифра 9 — лишь в 4.6%.</p>
<p>Если распределение в твоих данных отклоняется от закона Бенфорда — это статистический сигнал манипуляции. Работает для: расходных операций, счетов-фактур, авансовых отчётов.</p>
<div class="formula">Ожидаемая частота первой цифры d по Бенфорду:
P(d) = log₁₀(1 + 1/d)

d=1: 30.1%, d=2: 17.6%, d=3: 12.5%
d=4: 9.7%, d=5: 7.9%, d=6: 6.7%
d=7: 5.8%, d=8: 5.1%, d=9: 4.6%

Реализация: =LOG10(1+1/первая_цифра)</div>
<h4>11.3 Ключевые контрольные процедуры для AI-автоматизации</h4>
<ul>
<li><strong>Segregation of Duties (SoD):</strong> один человек не может заказать И авторизовать И оплатить. AI проверяет цепочку авторизаций автоматически.</li>
<li><strong>Three-Way Matching:</strong> PO (заказ) + GR (приёмка) + Invoice (счёт) должны совпадать. AI сопоставляет автоматически, отклонения — в очередь на ревью.</li>
<li><strong>Duplicate Payment Detection:</strong> поиск дублирующихся платежей (одинаковый поставщик + сумма + период ±30 дней)</li>
<li><strong>Round Number Test:</strong> аномально высокая доля "круглых" сумм (10,000; 50,000; 100,000) — признак манипуляций</li>
</ul>
<h4>11.4 AI Contract Review</h4>
<p>Claude может анализировать договоры на соответствие политике закупок, выявлять нестандартные условия и потенциальные риски. Промпт: "Проанализируй этот договор на поставку [загружаешь текст]. Проверь: соответствие лимитам авторизации, наличие штрафных санкций за просрочку, условия о конфиденциальности, отсутствие токсичных условий (одностороннее расторжение, гарантии). Составь список рисков по приоритету."</p>`,

{id:'m12',level:'advanced',num:'12',week:7,title:'Fraud Detection и безопасность финансов',goal:'Разработать многоуровневую систему обнаружения мошенничества с ML и AI.',duration:'9ч',
lesson:`<h4>12.1 Типология мошенничества в МСБ</h4>
<p>По ACFE Global Fraud Report, наиболее распространённые схемы:</p>
<ul>
<li><strong>Asset Misappropriation (89% случаев):</strong> воровство наличных, товаров, манипуляции с авансовыми отчётами</li>
<li><strong>Схемы с закупками (40%):</strong> фиктивные поставщики, откаты, завышение цен в сговоре</li>
<li><strong>Payroll Fraud:</strong> "мёртвые души" в ведомости, завышение часов, фиктивные командировки</li>
<li><strong>Financial Statement Fraud:</strong> искажение отчётности для получения кредита / выхода на инвестора</li>
</ul>
<h4>12.2 Аномалии: Статистические методы</h4>
<ul>
<li><strong>Z-score:</strong> (значение - среднее) / стандартное отклонение. Если |Z| > 2.5 — аномалия</li>
<li><strong>IQR метод:</strong> аномалия если значение < Q1 - 1.5×IQR или > Q3 + 1.5×IQR</li>
<li><strong>Паттерн-анализ:</strong> у кассира X среднее число отмен = 3/день, у остальных = 0.5/день — статистически значимо</li>
</ul>
<div class="formula">Z-score в Google Sheets:
=(A2-AVERAGE($A$2:$A$100))/STDEV($A$2:$A$100)
Если результат >2.5 или <-2.5 → условное форматирование красным</div>
<h4>12.3 Network Analysis: Выявление связанных сторон</h4>
<p>Классическая схема: сотрудник регистрирует фиктивного поставщика на родственника. Network Analysis выявляет:</p>
<ul>
<li>Совпадение адресов поставщика и сотрудника</li>
<li>Совпадение телефонов/email в регистрационных данных</li>
<li>Поставщик зарегистрирован незадолго до первой транзакции</li>
<li>Единственный контрагент у поставщика — ваша компания</li>
</ul>
<h4>12.4 AI как инструмент расследования</h4>
<p>Claude для финансовой криминалистики:</p>
<ul>
<li>Анализ паттернов в неструктурированных данных (переписка, записки)</li>
<li>Систематизация большого объёма транзакций — выявление связей</li>
<li>Генерация гипотез мошеннической схемы по набору аномалий</li>
<li>Составление аудиторских запросов и объяснительных</li>
</ul>`,

{id:'m13',level:'advanced',num:'13',week:8,title:'AI Forecasting и сценарное планирование',goal:'Освоить AI-методы финансового прогнозирования — от временных рядов до LLM-сценариев.',duration:'10ч',
lesson:`<h4>13.1 Иерархия методов прогнозирования</h4>
<p>Выбор метода зависит от горизонта, качества данных и бизнес-контекста:</p>
<ul>
<li><strong>Краткосрочный (1–4 недели):</strong> Moving Average, Exponential Smoothing — просто, работает для стабильных рядов</li>
<li><strong>Среднесрочный (1–12 месяцев):</strong> ARIMA, Facebook Prophet — учитывают тренды и сезонность</li>
<li><strong>Долгосрочный (1–3 года):</strong> Econometric models, Driver-based + macro-факторы + экспертные суждения</li>
</ul>
<h4>13.2 Facebook Prophet: Лучший инструмент для МСБ</h4>
<p>Prophet — библиотека от Meta, разработанная для бизнес-прогнозирования. Ключевые преимущества:</p>
<ul>
<li>Автоматически определяет сезонность (недельную, ежегодную)</li>
<li>Обрабатывает пропуски в данных</li>
<li>Учитывает праздники (Новый год, Наурыз — можно добавить казахстанские)</li>
<li>Выдаёт доверительный интервал</li>
<li>Работает в Google Colab (бесплатно, без установки)</li>
</ul>
<div class="formula">Минимальный Prophet код (Google Colab):
from prophet import Prophet
import pandas as pd

df = pd.read_csv('выручка.csv')  # columns: ds (date), y (value)
model = Prophet(yearly_seasonality=True, 
                weekly_seasonality=True)
model.fit(df)
future = model.make_future_dataframe(periods=90)
forecast = model.predict(future)
fig = model.plot(forecast)</div>
<h4>13.3 Macroeconomic Integration</h4>
<p>Казахстанский контекст: выручка многих бизнесов сильно зависит от курса USD/KZT, цены нефти (через доходы населения), инфляции. Добавление этих факторов улучшает точность прогноза на 15–30%.</p>
<ul>
<li>API Нацбанка РК: курсы валют, базовая ставка</li>
<li>Trading Economics API: цена нефти Brent, макро-индикаторы</li>
<li>Казстат: ИПЦ, данные по торговле</li>
</ul>
<h4>13.4 LLM для нарративных сценариев</h4>
<p>После количественного прогноза нужен качественный нарратив. Claude генерирует сценарии-истории:</p>
<p>Промпт: "На основе следующих макродопущений [данные] разработай нарративный сценарий развития рынка мебели в Казахстане на 2025–2026 год. Опиши конкретные события, которые могут произойти в Bull/Base/Bear сценарии, и их влияние на финансовые показатели бизнеса."</p>`,

Характеристики бизнеса:

{id:'m14',level:'advanced',num:'14',week:8,title:'ERP + AI: Интеграция и автоматизация',goal:'Научиться строить AI-слой поверх ERP и создавать умные финансовые коннекторы.',duration:'8ч',
lesson:`<h4>14.1 ERP-ландшафт в Казахстане</h4>
<ul>
<li><strong>1С:Предприятие (8.3):</strong> доминирует в МСБ и среднем сегменте. 70%+ компаний РК используют 1С.</li>
<li><strong>SAP S/4HANA:</strong> крупные корпорации, холдинги, банки. Встроенные AI модули с 2024.</li>
<li><strong>Odoo:</strong> растущая популярность среди технологичных МСБ. Open source, отличная API.</li>
<li><strong>Oracle NetSuite:</strong> международные компании с операциями в РК.</li>
</ul>
<h4>14.2 1С + AI: Практические интеграции</h4>
<p>1С не имеет нативного AI, но его можно построить поверх:</p>
<ul>
<li><strong>OData API 1С:</strong> выгрузка любых данных в JSON/XML без программирования в конфигураторе</li>
<li><strong>COM-объект:</strong> для Windows-серверов, более полный доступ к данным</li>
<li><strong>Выгрузка файлов:</strong> самый простой способ — 1С → Excel/CSV → Python/Sheets</li>
</ul>
<div class="formula">ETL пайплайн 1С → AI Analytics:
1. Scheduler (cron/Make) запускает скрипт каждую ночь
2. Python читает данные из 1С через OData API
3. Очистка и трансформация (pandas)
4. Загрузка в Google BigQuery / Sheets
5. Looker Studio / Power BI строит дашборды
6. Claude API генерирует ежеутренний AI-комментарий</div>
<h4>14.3 API-First Финансовая Архитектура</h4>
<p>Современный подход: каждая система предоставляет данные через API, AI-слой агрегирует и анализирует. Преимущество: смена ERP не ломает аналитику.</p>
<ul>
<li>ERP (источник данных) → API → Data Lake (хранение) → Analytics Layer (анализ) → Presentation Layer (дашборды) → AI Layer (интерпретация)</li>
<li>Для МСБ: 1С → Google Sheets (через выгрузку) → Looker Studio → Claude API</li>
<li>Для средних компаний: ERP → BigQuery → Power BI → Claude API</li>
</ul>
<h4>14.4 Odoo AI для МСБ</h4>
<p>Odoo 17 (2024) включает встроенные AI модули:</p>
<ul>
<li>AI-assisted invoice matching (сопоставление счетов)</li>
<li>Smart inventory forecasting</li>
<li>Automated journal entries</li>
<li>Chatbot для внутренних запросов к ERP</li>
</ul>`,

{id:'m15',level:'advanced',num:'15',week:9,title:'AI Governance и финансовая безопасность',goal:'Разработать политику управления AI в финансовой функции и обеспечить соответствие.',duration:'7ч',

<p>EU AI Act (вступает в силу поэтапно 2024–2027) вводит классификацию рисков AI-систем. Для финансов:</p>
<ul>
<li><strong>High Risk AI:</strong> кредитный скоринг, оценка платёжеспособности, страховые тарифы — требуют регистрации, валидации, объяснимости</li>
<li><strong>Limited Risk:</strong> AI-ассистенты, чатботы — нужно раскрытие что это AI</li>
<li><strong>Minimal Risk:</strong> спам-фильтры, рекомендательные системы — свободное использование</li>
</ul>
<h4>15.2 AI Model Risk Management</h4>
<p>Для финансовых AI-моделей (прогнозирование, скоринг) необходима система управления рисками модели:</p>
<ul>
<li><strong>Model Validation:</strong> независимая проверка точности модели перед вводом в эксплуатацию</li>
<li><strong>Drift Monitoring:</strong> отслеживание деградации точности модели со временем</li>
<li><strong>Fallback Procedure:</strong> что делать если модель отказала или даёт аномальный результат</li>
<li><strong>Explainability:</strong> способность объяснить каждое решение модели (особенно для кредитных решений)</li>
</ul>
<h4>15.3 Безопасность финансовых AI</h4>
<ul>
<li><strong>Prompt Injection:</strong> злоумышленник встраивает инструкции в данные, которые обрабатывает AI. Защита: валидация входных данных, изоляция контекстов.</li>
<li><strong>Data Poisoning:</strong> намеренное искажение обучающих данных для получения нужного поведения модели</li>
<li><strong>Model Inversion:</strong> извлечение конфиденциальных данных из обученной модели через запросы</li>
<li><strong>Принцип минимальных привилегий:</strong> AI-агент должен иметь доступ только к данным, необходимым для конкретной задачи</li>
</ul>
<h4>15.4 Казахстанский регуляторный контекст</h4>
<ul>
<li>Закон РК "О персональных данных" (№ 94-V) — основа защиты данных в РК</li>
<li>Регулирование Агентства по защите и развитию конкуренции (АЗРК) в части алгоритмического ценообразования</li>
<li>НБ РК: требования к AI-системам в банках (2024) — модельный риск, объяснимость</li>
<li>МФЦА (Astana International Financial Centre): принимает EU GDPR как базовый стандарт</li>
</ul>`,

{id:'m16',level:'expert',num:'16',week:10,title:'AI Finance Consulting: Методология и продажи',goal:'Освоить полный цикл AI-финансового консалтинга: диагностика, продажа, внедрение.',duration:'10ч',
lesson:`<h4>16.1 Консалтинговые фреймворки для AI-проектов</h4>
<p>AI-консалтинг в финансах — это не IT-проект и не финансовый анализ. Это трансформация. Ключевые фреймворки:</p>
<ul>
<li><strong>McKinsey 7S:</strong> Strategy, Structure, Systems, Shared Values, Skills, Style, Staff — AI влияет на все 7 элементов</li>
<li><strong>MECE (Mutually Exclusive, Collectively Exhaustive):</strong> структурирование проблемы без дублирований и пропусков</li>
<li><strong>Issue Tree:</strong> декомпозиция проблемы "выручка падает" до конкретных гипотез</li>
</ul>
<h4>16.2 Диагностика AI-готовности за 2 часа</h4>
<p>AI Readiness Assessment — первый инструмент при работе с клиентом. 5 измерений:</p>
<ul>
<li><strong>Data Quality (1–5):</strong> есть ли структурированные данные? Оцифрованы ли процессы?</li>
<li><strong>Process Maturity (1–5):</strong> описаны ли процессы? Есть ли KPI?</li>
<li><strong>Tech Stack (1–5):</strong> какие системы? Есть ли API? Облако или on-premise?</li>
<li><strong>People & Culture (1–5):</strong> готова ли команда к изменениям? Есть ли чемпион внутри?</li>
<li><strong>Budget & Commitment (1–5):</strong> есть ли выделенный бюджет и поддержка CEO?</li>
</ul>
<p>Итоговый скор: 20–25 = готов к advanced AI, 12–19 = foundational work first, <12 = начинаем с цифровизации базы.</p>
<h4>16.3 Структура Winning Proposal</h4>
<ol>
<li><strong>Executive Summary:</strong> 1 страница — проблема, решение, ROI</li>
<li><strong>Текущая ситуация:</strong> диагностика, 3–5 ключевых проблем</li>
<li><strong>Предлагаемое решение:</strong> конкретные инструменты, процессы, результаты</li>
<li><strong>Дорожная карта:</strong> фазы, сроки, ответственные, milestones</li>
<li><strong>Команда:</strong> твой опыт, кейсы, экспертиза</li>
<li><strong>Коммерческие условия:</strong> стоимость, условия оплаты, ROI расчёт</li>
</ol>
<h4>16.4 Pricing Strategy для AI Finance Consulting</h4>
<ul>
<li><strong>Project-based:</strong> $2,000–15,000 за внедрение. Понятно клиенту, риск underscoping для тебя.</li>
<li><strong>Retainer:</strong> $800–3,000/мес. Стабильный доход, глубокое погружение. Лучший формат для "AI Finance Director as a Service"</li>
<li><strong>Value-based:</strong> % от задокументированного эффекта (экономии). Сложно продать, но самый высокий потенциал</li>
<li><strong>Daily rate (для корпораций):</strong> $300–1,500/день. Для CIS рынка казахстанские ставки: Senior consultant $200–400/день</li>
</ul>`,

{id:'m17',level:'expert',num:'17',week:10,title:'Личный бренд AI Finance Expert',goal:'Построить профессиональный бренд и создать входящий поток клиентов.',duration:'8ч',
lesson:`<h4>17.1 Позиционирование: Найди свою нишу</h4>
<p>Ошибка большинства: "Я помогаю бизнесу с финансами и AI". Это слишком широко. Клиент не понимает — это для него?</p>
<p>Формула позиционирования: Я помогаю [кому] [сделать что] с помощью [чем], чтобы [получить результат].</p>
<p>Примеры сильного позиционирования:</p>
<ul>
<li>"Я помогаю владельцам ресторанных сетей в Казахстане контролировать food cost и ФОТ в реальном времени с помощью AI-дашбордов"</li>
<li>"Я внедряю AI-бюджетирование для производственных компаний 50–500 сотрудников, сокращая время подготовки бюджета с 6 недель до 1"</li>
<li>"Я помогаю финансовым командам МСБ автоматизировать рутину: план-факт, закрытие месяца, управленческие отчёты"</li>
</ul>
<h4>17.2 LinkedIn Стратегия для B2B Финансового Консультанта</h4>
<ul>
<li><strong>Профиль:</strong> заголовок — не должность, а результат для клиента. Обложка — с твоими ключевыми словами. About — история + доказательства + CTA</li>
<li><strong>Контент микс (правило 3-1-1):</strong> 3 образовательных поста : 1 кейс/результат : 1 личное/backstage</li>
<li><strong>Viral mechanics в B2B:</strong> топ-10 списки работают лучше лонгридов. "5 ошибок при внедрении AI в финансовый отдел" > эссе о трансформации</li>
<li><strong>Engagement первых 30 минут:</strong> алгоритм LinkedIn даёт буст посту в первые 30 минут после публикации. Отвечай на комменты сразу.</li>
</ul>
<h4>17.3 Telegram-канал: Казахстанский B2B формат</h4>
<p>Telegram в Казахстане — это не просто мессенджер, это B2B медиа. Алматы/Астана деловое сообщество активно в Telegram.</p>
<ul>
<li>Нишевый канал "AI в бизнес-финансах" → 500–2,000 подписчиков через 6 месяцев</li>
<li>Форматы: короткие кейсы, прикладные советы, шаблоны в PDF, подборки инструментов</li>
<li>Монетизация канала: нативные интеграции, продажа курсов, лид-генерация для консалтинга</li>
</ul>
<h4>17.4 Сеть и партнёрства в Казахстане</h4>
<ul>
<li><strong>Атамекен (НПП):</strong> организует обучение для предпринимателей, ищут спикеров и тренеров</li>
<li><strong>Astana Hub:</strong> акселерационные программы, нужны менторы по финансам</li>
<li><strong>AIFC:</strong> финансовый центр, нетворкинг с финансовыми директорами</li>
<li><strong>ФРИИ:</strong> инвестфонд РФ, работающий в СНГ, акселераторы стартапов</li>
<li><strong>Клубы предпринимателей:</strong> EO Kazakhstan, YPO, локальные бизнес-клубы</li>
</ul>`,

{id:'m18',level:'expert',num:'18',week:11,title:'Монетизация: Модели дохода AI Finance Expert',goal:'Разработать и запустить 3-4 источника дохода на базе AI Finance экспертизы.',duration:'9ч',
lesson:`<h4>18.1 Revenue Stack: Несколько источников дохода</h4>
<p>Правило устойчивого дохода: не более 30% от одного источника. AI Finance эксперт может строить доход из 4 потоков:</p>
<ul>
<li><strong>Consulting (активный):</strong> 40–50% дохода. Высокий чек, ограничен временем.</li>
<li><strong>Retainer (полупассивный):</strong> 20–30%. Ежемесячный платёж, предсказуемость.</li>
<li><strong>Digital Products (пассивный):</strong> 10–20%. Шаблоны, курсы, гайды.</li>
<li><strong>Speaking/Training (активный):</strong> 10–15%. Высокий статус, нетворкинг.</li>
</ul>
<h4>18.2 Fractional CFO + AI: Модель будущего</h4>
<p>Fractional CFO — частичная занятость в роли CFO, обычно 8–20 часов в месяц. Рост рынка: +45%/год в СНГ. Почему AI усиливает ценность:</p>
<ul>
<li>Ты один делаешь работу команды из 2–3 человек (AI автоматизирует рутину)</li>
<li>Клиент получает "умного CFO" за цену одного финансиста</li>
<li>Ты можешь вести 4–6 клиентов одновременно = $4,000–18,000/мес</li>
</ul>
<div class="formula">Fractional CFO пакет (пример для КЗ рынка):
Basic: 4ч/мес, $600–800/мес
- Ежемесячный P&L + комментарий
- Квартальный бюджет ревью
- Ответы на финансовые вопросы (WhatsApp/Telegram)

Growth: 8ч/мес, $1,200–1,800/мес
- Basic + еженедельный KPI мониторинг
- AI дашборд с автообновлением
- Бюджет на год + rolling forecast

Transform: 16ч/мес, $2,500–4,000/мес
- Growth + AI система учёта под ключ
- Team training (2ч/квартал)
- Стратегическая сессия (1×квартал)</div>
<h4>18.3 Digital Products: Пассивный доход</h4>
<p>Что продаётся у AI Finance экспертов:</p>
<ul>
<li><strong>Google Sheets шаблоны:</strong> P&L + Dashboard ($29–49), HoReCa полная система ($79–99), Budgeting + Forecast ($49–79)</li>
<li><strong>Prompt Packs:</strong> набор из 30–50 промптов для финансистов ($15–29)</li>
<li><strong>Notion системы:</strong> AI Finance Director OS, Consulting CRM ($39–79)</li>
<li><strong>PDF Гайды:</strong> "AI для бухгалтера за 7 дней", "10 Make-сценариев для финансов" ($9–19)</li>
</ul>
<p>Платформы для продажи: Gumroad (международно), Boosty.to (СНГ), Telegram-ботom (для Казахстана).</p>`,

lesson:`<h4>19.1 Instructional Design: Как учится взрослый</h4>
<p>Андрагогика (наука об обучении взрослых) говорит: взрослые учатся иначе, чем дети. Ключевые принципы:</p>
<ul>
<li>Взрослые учатся когда видят прямую применимость. Каждый модуль должен начинаться с "Почему это важно для тебя прямо сейчас"</li>
<li>Практика важнее теории: соотношение 30% теория : 70% практика</li>
<li>Социальное обучение: обсуждение, фидбек от ментора, peer learning</li>
<li>Немедленное применение: задание делается в реальных условиях студента</li>
</ul>
<h4>19.2 Curriculum Design для AI Finance курса</h4>
<p>Правило "трансформационного результата": студент должен иметь конкретный, измеримый результат после каждого модуля — не просто "знания", а готовый артефакт (шаблон, система, документ).</p>
<ul>
<li>Уровень 1 (Foundation): студент создаёт AI Prompt Library и первый автоматизированный отчёт</li>
<li>Уровень 2 (Intermediate): студент строит полную систему управленческого учёта для своего или учебного бизнеса</li>
<li>Уровень 3 (Advanced): студент внедряет Fraud Detection и AI Forecasting систему</li>
<li>Уровень 4 (Expert): студент получает первого платящего клиента или публикует первый digital product</li>
</ul>
<h4>19.3 Технический стек курса (минимальный и масштабируемый)</h4>
<ul>
<li><strong>MVP (бесплатно):</strong> Telegram канал + закрытый чат + Notion (материалы) + Loom (видео). Запуск за 2 дня.</li>
<li><strong>Growth ($50–100/мес):</strong> GetCourse или Teachable + Telegram + Zoom Q&A</li>
<li><strong>Scale ($200–500/мес):</strong> Кастомная платформа / White-label LMS + Community + Cohorts</li>
</ul>
<h4>19.4 Launch Strategy: Первый набор</h4>
<ol>
<li>Waitlist за 3 недели до старта (цель: 50–100 человек)</li>
<li>Presale со скидкой 30% ("Early Bird") — финансируешь создание контента</li>
<li>Live Cohort: первый поток веди в прямом эфире — собираешь фидбек и дорабатываешь</li>
<li>Case Study: документируй истории успеха студентов</li>
<li>Evergreen запуск: после 2–3 когорт переводи в автоворонку</li>
</ol>`,

// ═══════════════════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════════════════
let S={
  view:'dashboard',
  mod:null,
  tab:'lesson',
  done:{},
  openLevels:{foundation:true,intermediate:false,advanced:false,expert:false},
  answers:{},   // {modId_type_idx: text}
  files:{}      // {modId_type_idx: filename}
};

function load(){
  try{
    const d=localStorage.getItem('aifa_v3');
    if(d){const p=JSON.parse(d);S.done=p.done||{};S.openLevels=p.openLevels||S.openLevels;S.answers=p.answers||{};S.files=p.files||{};}
  }catch(e){}
}
function save(){
  try{localStorage.setItem('aifa_v3',JSON.stringify({done:S.done,openLevels:S.openLevels,answers:S.answers,files:S.files}));}catch(e){}
}
function saveAnswer(key,val){S.answers[key]=val;save();showSaved(key);}
function getAnswer(key){return S.answers[key]||'';}

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function lc(lid){return LEVELS.find(l=>l.id===lid)||LEVELS[0];}
function countDone(){return Object.keys(S.done).filter(k=>S.done[k]).length;}
function pct(){return Math.round(countDone()/MODULES.length*100);}
function notif(txt,icon='✅'){
  document.getElementById('notifIco').textContent=icon;
  document.getElementById('notifTxt').textContent=txt;
  const el=document.getElementById('notif');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}
const savedTimers={};
function showSaved(key){
  clearTimeout(savedTimers[key]);
  const el=document.getElementById('saved_'+key);
  if(el){el.textContent='✓ Сохранено';el.style.color='var(--green)';}
  savedTimers[key]=setTimeout(()=>{if(el)el.textContent='';},2000);
}

// NAV
// ═══════════════════════════════════════════════════════
function renderNav(){
  const n=document.getElementById('nav');
  let h='';
  // top links
  const topLinks=[
    {icon:'🏠',label:'Главная',view:'dashboard'},
    {icon:'🗺️',label:'Roadmap',view:'roadmap'},
    {icon:'📅',label:'Учебный план',view:'schedule'},
    {icon:'💰',label:'Монетизация',view:'monetize'}
  ];
  topLinks.forEach(l=>{
    h+=`<div class="nav-link ${S.view===l.view&&!S.mod?'act':''}" onclick="goView('${l.view}')"><span>${l.icon}</span><span>${l.label}</span></div>`;
  });
  h+='<div class="nav-sep"></div>';
  LEVELS.forEach(lv=>{
    const mods=MODULES.filter(m=>m.level===lv.id);
    const doneC=mods.filter(m=>S.done[m.id]).length;
    const isOpen=S.openLevels[lv.id];
    h+=`<div class="nav-lv">
      <div class="nav-lv-h ${isOpen?'open':''}" onclick="toggleLv('${lv.id}')">
        <div class="lv-dot" style="background:${lv.color};opacity:${isOpen?1:.35}"></div>
        <span>${lv.label}</span>
        <span style="margin-left:4px;font-size:9px;color:var(--text3)">${doneC}/${mods.length}</span>
        <span class="lv-arr ${isOpen?'open':''}">▶</span>
      </div>
      <div class="nav-mods ${isOpen?'open':''}">`;
    mods.forEach(m=>{
      const act=S.view==='module'&&S.mod===m.id;
      const done=!!S.done[m.id];
      h+=`<div class="nav-mod ${act?'act':''}" onclick="goModule('${m.id}')">
        <span class="nm-n">${m.num}</span>
        <span class="nm-t">${m.title}</span>
        <div class="nm-chk ${done?'done':''}">${done?'✓':''}</div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  n.innerHTML=h;
  updateProgress();
}
function toggleLv(id){S.openLevels[id]=!S.openLevels[id];save();renderNav();}
function updateProgress(){
  const p=pct(),d=countDone(),t=MODULES.length;
  document.getElementById('pctLabel').textContent=p+'%';
  document.getElementById('pbFill').style.width=p+'%';
  document.getElementById('cntLabel').textContent=`${d} / ${t} модулей`;
}

// ═══════════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════════
function goView(v){S.view=v;S.mod=null;renderNav();renderPage();}
function goModule(id){S.view='module';S.mod=id;S.tab='lesson';renderNav();renderPage();}
function switchTab(t){S.tab=t;renderPage();}

function renderPage(){
  const pg=document.getElementById('page');
  if(S.view==='dashboard')pg.innerHTML=renderDashboard();
  else if(S.view==='module')pg.innerHTML=renderModule();
  else if(S.view==='roadmap')pg.innerHTML=renderRoadmap();
  else if(S.view==='schedule')pg.innerHTML=renderSchedule();
  else if(S.view==='monetize')pg.innerHTML=renderMonetize();
  document.querySelector('.main').scrollTo(0,0);
  attachListeners();
}

async function callAI(prompt, targetId, contentId) {
  const box = document.getElementById(targetId);
  const content = document.getElementById(contentId);
  if (!box || !content) return;
  box.classList.add('show');
  content.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{role: 'user', content: prompt}]
      })
    });
    const data = await res.json();
    const text = data.content?.map(b => b.text || '').join('') || 'Нет ответа';
    // Format response
    let formatted = text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/^### (.*?)$/gm, '<h4>$1</h4>')
      .replace(/^## (.*?)$/gm, '<h4>$1</h4>')
      .replace(/^- (.*?)$/gm, '• $1')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');
    content.innerHTML = formatted;
  } catch(e) {
    content.innerHTML = 'Ошибка: ' + e.message;
  }
}

  notif(S.done[id]?'✅ Модуль завершён!':'↩️ Отметка снята');
  const nextIdx=MODULES.findIndex(m=>m.id===id)+1;
  if(S.done[id]&&nextIdx<MODULES.length){
    setTimeout(()=>goModule(MODULES[nextIdx].id),600);
  } else {
    renderNav();renderPage();
  }
}

let autoSaveTimers={};
function autoSave(key,val){
  clearTimeout(autoSaveTimers[key]);
  autoSaveTimers[key]=setTimeout(()=>saveAnswer(key,val),1500);
}

function clearAnswer(key){
  if(confirm('Очистить сохранённый ответ?')){
    S.answers[key]='';
    save();
    const el=document.getElementById('ws_'+key);
    if(el)el.value='';
  }
}

function attachFile(key,input){
  if(input.files&&input.files[0]){
    S.files[key]=input.files[0].name;
    save();
    notif('📎 Файл прикреплён: '+input.files[0].name);
    renderPage();
  }
}

function attachListeners(){
  // Enter key for ask input
  document.querySelectorAll('.ask-inp').forEach(inp=>{
    inp.addEventListener('keydown',function(e){
      if(e.key==='Enter'){
        const modId=this.id.replace('ask_inp_','');
        askModuleAI(modId);
      }
    });
  });
}

load();
renderNav();
renderPage();
 document.querySelectorAll('.nav-link, .nav-mod').forEach(item => {
    item.addEventListener('click', () => {
        if (window.innerWidth <= 768) {
            document.querySelector('.sidebar').classList.remove('active');
        }
    });
});
