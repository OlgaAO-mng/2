<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ИИ для адвоката по ДТП</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #22263a;
  --border: rgba(255,255,255,0.08);
  --text: #f0f2ff;
  --muted: rgba(240,242,255,0.55);
  --dim: rgba(240,242,255,0.3);
  --accent: #4f7fff;
  --accent2: #6ee7b7;
  --gold: #f59e0b;
  --red: #f87171;
  --radius: 14px;
  --radius-sm: 9px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.55}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden}
/* HEADER */
.header{flex-shrink:0;padding:14px 16px 10px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.header-back{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:none;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.header-info{flex:1;min-width:0}
.header-title{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-sub{font-size:12px;color:var(--muted)}
.header-ico{font-size:22px}
/* SCROLL AREA */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0}
.scroll::-webkit-scrollbar{display:none}
/* HOME SCREEN */
.home{padding:20px 16px 100px}
.logo-area{text-align:center;padding:24px 0 20px}
.logo-emoji{font-size:48px;margin-bottom:8px}
.logo-title{font-size:20px;font-weight:700;color:var(--text)}
.logo-sub{font-size:13px;color:var(--muted);margin-top:4px}
.days-grid{display:flex;flex-direction:column;gap:10px}
.day-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:transform .1s;position:relative;overflow:hidden}
.day-card:active{transform:scale(0.98)}
.day-card.locked{opacity:.5}
.day-card.done{border-color:rgba(110,231,183,0.3)}
.day-card.active-day{border-color:rgba(79,127,255,0.5);background:rgba(79,127,255,0.07)}
.day-num{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.day-title{font-size:15px;font-weight:600;margin-bottom:4px}
.day-desc{font-size:12px;color:var(--muted)}
.day-meta{display:flex;align-items:center;gap:8px;margin-top:8px}
.day-badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600}
.badge-blue{background:rgba(79,127,255,0.15);color:#7ca5ff}
.badge-green{background:rgba(110,231,183,0.15);color:#6ee7b7}
.badge-gold{background:rgba(245,158,11,0.15);color:#f59e0b}
.day-progress{position:absolute;bottom:0;left:0;height:2px;background:var(--accent2);border-radius:0 99px 99px 0;transition:width .5s}
/* LESSON SCREEN */
.lesson-wrap{padding:16px 16px 120px}
.lesson-step{display:none}
.lesson-step.visible{display:block}
/* STEP TYPES */
.step-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:4px 10px;border-radius:99px;margin-bottom:12px}
.tag-theory{background:rgba(79,127,255,0.15);color:#7ca5ff}
.tag-example{background:rgba(245,158,11,0.15);color:#f59e0b}
.tag-task{background:rgba(110,231,183,0.15);color:#6ee7b7}
.tag-prompt{background:rgba(167,139,250,0.15);color:#a78bfa}
.step-title{font-size:18px;font-weight:700;line-height:1.3;margin-bottom:10px}
.step-body{font-size:14px;color:rgba(240,242,255,0.85);line-height:1.65}
.step-body p{margin-bottom:10px}
.step-body strong{color:var(--text);font-weight:600}
.step-body ul{margin:8px 0 8px 18px}
.step-body li{margin-bottom:5px}
/* PROMPT BOX */
.prompt-box{background:var(--bg3);border:1px solid rgba(167,139,250,0.25);border-radius:var(--radius);padding:14px;margin:14px 0;position:relative}
.prompt-label{font-size:10px;color:#a78bfa;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.prompt-text{font-size:13px;color:rgba(240,242,255,0.9);line-height:1.6;white-space:pre-wrap;font-family:'Courier New',monospace}
.copy-btn{position:absolute;top:10px;right:10px;background:rgba(167,139,250,0.15);border:none;color:#a78bfa;font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;font-weight:600}
.copy-btn:active{opacity:.7}
/* EXAMPLE BOX */
.example-box{background:linear-gradient(135deg,rgba(245,158,11,0.08),rgba(245,158,11,0.03));border:1px solid rgba(245,158,11,0.2);border-radius:var(--radius);padding:14px;margin:14px 0}
.example-q{font-size:12px;color:var(--gold);font-weight:700;margin-bottom:6px}
.example-role{font-size:11px;color:var(--muted);padding:4px 8px;border-radius:6px;display:inline-block;margin-bottom:4px}
.role-user{background:rgba(79,127,255,0.12);color:#7ca5ff}
.role-ai{background:rgba(110,231,183,0.12);color:#6ee7b7}
.example-msg{font-size:13px;line-height:1.55;margin-bottom:6px;padding:8px 10px;border-radius:8px}
.msg-user{background:rgba(79,127,255,0.1)}
.msg-ai{background:rgba(110,231,183,0.07)}
/* INFO CARD */
.info-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin:12px 0}
.info-card-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px}
.info-card-text{font-size:13px;color:var(--muted);line-height:1.55}
/* COMPARE TABLE */
.compare{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px}
.compare th{background:var(--bg3);color:var(--muted);font-weight:600;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
.compare td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:top}
.compare tr:last-child td{border-bottom:none}
/* TASK AREA */
.task-box{background:rgba(110,231,183,0.05);border:1px solid rgba(110,231,183,0.2);border-radius:var(--radius);padding:14px;margin:14px 0}
.task-q{font-size:13px;font-weight:600;color:var(--accent2);margin-bottom:10px}
.task-hint{font-size:12px;color:var(--muted);margin-bottom:10px;font-style:italic}
.task-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;padding:12px;resize:none;min-height:120px;line-height:1.55;outline:none;font-family:inherit}
.task-input:focus{border-color:rgba(110,231,183,0.4)}
.check-btn{width:100%;margin-top:10px;padding:13px;background:var(--accent2);color:#0f2419;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s}
.check-btn:disabled{opacity:.5;cursor:not-allowed}
.check-btn:active:not(:disabled){opacity:.8}
/* FEEDBACK */
.feedback-box{background:var(--bg3);border-radius:var(--radius);padding:14px;margin-top:12px;display:none}
.feedback-box.show{display:block}
.feedback-score{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.score-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.score-great{background:rgba(110,231,183,0.2);color:var(--accent2);border:2px solid rgba(110,231,183,0.4)}
.score-ok{background:rgba(245,158,11,0.2);color:var(--gold);border:2px solid rgba(245,158,11,0.4)}
.score-low{background:rgba(248,113,113,0.2);color:var(--red);border:2px solid rgba(248,113,113,0.3)}
.score-label{font-size:14px;font-weight:700}
.feedback-text{font-size:13px;color:rgba(240,242,255,0.85);line-height:1.6}
.improvement-box{margin-top:10px;background:rgba(79,127,255,0.08);border-radius:var(--radius-sm);padding:10px 12px}
.improvement-title{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:6px}
.improvement-text{font-size:13px;color:rgba(240,242,255,0.8)}
.loading-dots{display:inline-flex;gap:4px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
/* NAVIGATION */
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:10px 16px 20px;display:flex;gap:10px;z-index:100}
.nav-prev{flex:0 0 auto;padding:13px 16px;background:var(--bg3);border:none;color:var(--text);border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer}
.nav-next{flex:1;padding:13px;background:var(--accent);border:none;color:#fff;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer}
.nav-next:disabled{opacity:.4;cursor:not-allowed}
.nav-next:active:not(:disabled){opacity:.85}
/* PROGRESS BAR */
.lesson-progress{padding:10px 16px 0;background:var(--bg)}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px}
.progress-track{height:3px;background:var(--bg3);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s}
/* CELEBRATION */
.celebrate{text-align:center;padding:30px 20px}
.celebrate-emoji{font-size:56px;margin-bottom:12px}
.celebrate-title{font-size:20px;font-weight:700;margin-bottom:8px}
.celebrate-text{font-size:14px;color:var(--muted);line-height:1.6}
.celebrate-btn{margin-top:20px;width:100%;padding:14px;background:var(--accent2);color:#0f2419;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer}
/* DIFF BADGES */
.diff{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px}
.diff-e{background:rgba(110,231,183,0.15);color:#6ee7b7}
.diff-m{background:rgba(245,158,11,0.15);color:#f59e0b}
.diff-h{background:rgba(248,113,113,0.15);color:#f87171}
/* CHEATSHEET */
.cheat-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.cheat-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center;padding-top:1px}
.cheat-body{flex:1}
.cheat-title{font-size:13px;font-weight:600;margin-bottom:2px}
.cheat-text{font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<div id="app">
  <div id="screen-home">
    <div class="scroll">
      <div class="home">
        <div class="logo-area">
          <div class="logo-emoji">⚖️🤖</div>
          <div class="logo-title">ИИ для адвоката по ДТП</div>
          <div class="logo-sub">5-дневный практический курс · 30 минут в день</div>
        </div>
        <div class="days-grid" id="days-list"></div>
      </div>
    </div>
  </div>

  <div id="screen-lesson" style="display:none;height:100%;flex-direction:column;display:none">
    <div class="header">
      <button class="header-back" id="btn-back">←</button>
      <div class="header-info">
        <div class="header-title" id="lesson-header-title"></div>
        <div class="header-sub" id="lesson-header-sub"></div>
      </div>
    </div>
    <div class="lesson-progress">
      <div class="progress-label">
        <span id="prog-label">Шаг 1 из 6</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
    </div>
    <div class="scroll" id="lesson-scroll">
      <div class="lesson-wrap" id="lesson-content"></div>
    </div>
    <div class="nav-bar">
      <button class="nav-prev" id="btn-prev">← Назад</button>
      <button class="nav-next" id="btn-next">Далее →</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// COURSE DATA
// ─────────────────────────────────────────────────────────────────
const COURSE = [
  {
    id:1,
    title:"Знакомство с ИИ-помощниками",
    subtitle:"Claude vs ChatGPT — что, когда и как",
    emoji:"🚀",
    duration:"28 мин",
    color:"#4f7fff",
    steps:[
      {
        type:"theory",
        title:"Что такое Claude и ChatGPT?",
        content:`<p>Claude (от Anthropic) и ChatGPT (от OpenAI) — это <strong>большие языковые модели (LLM)</strong>. Они обучены на огромных объёмах текста и умеют понимать и генерировать текст на любом языке.</p>
<p>Для вас, как адвоката по ДТП, это значит:</p>
<ul>
<li>📄 Они могут читать и анализировать документы</li>
<li>✍️ Составлять и редактировать документы по вашим инструкциям</li>
<li>🔍 Помогать находить слабые места в позиции противной стороны</li>
<li>🗣️ Объяснять клиентам сложные правовые понятия простым языком</li>
</ul>
<p><strong>Важно:</strong> ИИ — это инструмент, а не замена юриста. Он не знает специфику законодательства РК в деталях. Всегда проверяйте ссылки на НПА самостоятельно.</p>`,
      },
      {
        type:"compare",
        title:"Claude vs ChatGPT: что выбрать адвокату?",
        content:`<p>Оба инструмента подходят для юридической работы, но имеют разные сильные стороны:</p>`,
        table:[
          ["Критерий","Claude","ChatGPT"],
          ["Длинные документы","🟢 Отлично (200+ стр.)","🟡 Хуже с большими файлами"],
          ["Русский язык","🟢 Очень хорошо","🟢 Очень хорошо"],
          ["Юридический стиль","🟢 Чёткий, структурный","🟡 Иногда многословный"],
          ["Поиск в интернете","🟡 Платная подписка","🟢 Есть в ChatGPT Plus"],
          ["Цена","🟢 Бесплатно / $20/мес","🟢 Бесплатно / $20/мес"],
          ["Конфиденциальность","🟢 Строже","🟡 Данные могут обучать модель"],
        ],
        afterContent:`<div class="info-card"><div class="info-card-title">💡 Совет для старта</div><div class="info-card-text">Начните с <strong>Claude.ai</strong> для работы с документами и составления процессуальных бумаг. Используйте <strong>ChatGPT</strong> с поиском — для актуальных новостей и судебной практики (через Bing).</div></div>`,
      },
      {
        type:"theory",
        title:"Главный принцип: промт = техзадание",
        content:`<p>Качество ответа ИИ = качество вашего запроса. Запрос называется <strong>«промт»</strong> (от англ. prompt).</p>
<p>Хороший промт для юриста содержит 4 элемента:</p>
<ul>
<li><strong>1. Роль:</strong> «Ты — юридический помощник, специализирующийся на ДТП в Казахстане»</li>
<li><strong>2. Контекст:</strong> Конкретные обстоятельства дела</li>
<li><strong>3. Задача:</strong> Что именно нужно сделать</li>
<li><strong>4. Формат:</strong> Как должен выглядеть результат</li>
</ul>
<p>Плохой промт: <em>«Помоги с ДТП»</em><br>
Хороший промт: <em>«Ты юридический помощник. Мой клиент попал в ДТП 15 мая. Виновник скрылся. Страховая отказывает в выплате. Составь перечень документов для подачи иска в суд по законодательству РК»</em></p>`,
      },
      {
        type:"prompt",
        title:"Ваш первый промт: знакомство с ДТП-делом",
        prompt:`Ты — опытный юридический помощник, специализирующийся на делах о ДТП в Казахстане.

Обстоятельства дела:
- Дата: [ДАТА]
- Место: [АДРЕС]
- Мой клиент: водитель автомобиля [МАРКА, НОМЕР]
- Противная сторона: [ОПИСАНИЕ]
- Полицейский протокол: [ЕСТЬ/НЕТ, НОМЕР]
- Травмы: [ОПИСАНИЕ]

Пожалуйста:
1. Определи тип ДТП и применимые статьи ГК РК и КоАП РК
2. Составь перечень документов, которые нужно собрать
3. Укажи срок исковой давности для данного типа дела
4. Назови 3 типичные ошибки клиентов в такой ситуации`,
        note:"Скопируйте этот промт в Claude или ChatGPT и замените [ТЕКСТ В СКОБКАХ] на реальные данные вашего дела. Попробуйте прямо сейчас!",
      },
      {
        type:"example",
        title:"Пример реального диалога с Claude",
        msgs:[
          {role:"user",text:"Ты юридический помощник по ДТП в Казахстане. Мой клиент Асанов А. ехал по ул. Ленина в Алматы, его подрезал Lexus RX 350 (гос. номер XXX), клиент не успел затормозить и ударил в бок Lexus. Виновник признал вину на месте, но потом отказался. Есть видеорегистратор. Какие документы нужны для суда?"},
          {role:"ai",text:"Для успешного иска вам понадобятся:\n\n📁 ОБЯЗАТЕЛЬНЫЕ ДОКУМЕНТЫ:\n1. Протокол ДТП (форма) — копия из дорожной полиции\n2. Постановление об административном правонарушении\n3. Схема ДТП, подписанная обеими сторонами\n4. Акт осмотра ТС — независимая оценка ущерба\n\n📸 ДОКАЗАТЕЛЬНАЯ БАЗА:\n5. Запись видеорегистратора (оригинал + заверенная копия)\n6. Показания свидетелей (нотариально заверенные)\n7. Фотографии с места ДТП\n\n🏥 ПРИ НАЛИЧИИ ТРАВМ:\n8. Справка из травмпункта / выписка из стационара\n9. Чеки за лечение и лекарства\n\n⚖️ ПРАВОВАЯ ОСНОВА:\nСт. 917 ГК РК (возмещение вреда), ст. 935 ГК РК (вред, причинённый транспортным средством). Срок исковой давности — 3 года (ст. 178 ГК РК)."},
        ],
      },
      {
        type:"task",
        title:"Практика: составь свой первый промт",
        question:"Используя шаблон из Шага 4, напишите промт для СВОЕГО реального (или учебного) дела. Включите хотя бы 3 элемента: роль, контекст, конкретную задачу.",
        hint:"Подсказка: возьмите любое дело из практики или придумайте сценарий — например, клиент пострадал в ДТП по вине нетрезвого водителя.",
        rubric:{great:"Есть роль ИИ, конкретные обстоятельства дела, конкретный вопрос/задача",ok:"Есть контекст и задача, но нет роли",low:"Слишком общий запрос без деталей"},
        ideal:"Ты — юридический помощник по ДТП в Казахстане. Мой клиент Иванов И.И., пострадал в ДТП 10 июня 2025 года на пр. Абая в Алматы. Виновник был в состоянии алкогольного опьянения (есть протокол полиции). Клиент получил перелом руки. Страховая виновника — Halyk Insurance. Помоги составить план действий: какие документы собрать, куда обратиться и в какие сроки.",
      },
    ]
  },
  {
    id:2,
    title:"Анализ документов по ДТП",
    subtitle:"Протоколы, медзаписи, страховые документы",
    emoji:"📋",
    duration:"30 мин",
    color:"#f59e0b",
    steps:[
      {
        type:"theory",

// ─────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────
const state = {
  currentDay: null,
  currentStep: 0,
  progress: JSON.parse(localStorage.getItem('dtp_progress')||'{}'),
  stepUnlocked: {},
  feedbackGiven: {},
};

function saveProgress(){
  localStorage.setItem('dtp_progress', JSON.stringify(state.progress));
}

// ─────────────────────────────────────────────────────────────────
// HOME SCREEN
// ─────────────────────────────────────────────────────────────────
function renderHome(){
  document.getElementById('screen-lesson').style.display='none';
  document.getElementById('screen-home').style.display='block';
  const list = document.getElementById('days-list');
  list.innerHTML = COURSE.map((day,i)=>{
    const prog = state.progress[day.id] || 0;
    const total = day.steps.length;
    const pct = Math.round(prog/total*100);
    const done = prog>=total;
    const isActive = i===0 || (state.progress[COURSE[i-1]?.id]||0) >= COURSE[i-1]?.steps.length;
    return `<div class="day-card ${done?'done':''} ${isActive&&!done?'active-day':''} ${!isActive?'locked':''}"
      onclick="${isActive?`openDay(${day.id})`:'showLocked()'}"
      style="border-left:3px solid ${done?'#6ee7b7':isActive?day.color:'transparent'}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
        <div>
          <div class="day-num">День ${day.id} · ${day.duration}</div>
          <div class="day-title">${day.emoji} ${day.title}</div>
          <div class="day-desc">${day.subtitle}</div>
        </div>
        <div style="font-size:28px;opacity:0.9">${done?'✅':isActive?'▶️':'🔒'}</div>
      </div>
      <div class="day-meta">
        <span class="day-badge ${done?'badge-green':isActive?'badge-blue':'badge-gold'}">${done?'Завершён':isActive?`${pct}% выполнено`:'Заблокирован'}</span>
        <span style="font-size:11px;color:var(--muted)">${total} шагов</span>
      </div>
      ${pct>0?`<div class="day-progress" style="width:${pct}%"></div>`:''}
    </div>`;
  }).join('');
}

function showLocked(){
  if(window.Telegram?.WebApp) window.Telegram.WebApp.showAlert('Пройдите предыдущий день, чтобы разблокировать этот урок.');
  else alert('Пройдите предыдущий день, чтобы разблокировать этот урок.');
}

// ─────────────────────────────────────────────────────────────────
// LESSON SCREEN
// ─────────────────────────────────────────────────────────────────
function openDay(dayId){
  state.currentDay = COURSE.find(d=>d.id===dayId);
  state.currentStep = 0;
  state.feedbackGiven = {};
  document.getElementById('screen-home').style.display='none';
  const ls = document.getElementById('screen-lesson');
  ls.style.display='flex';
  ls.style.flexDirection='column';
  ls.style.height='100%';
  renderStep();
}

function renderStep(){
  const day = state.currentDay;
  const step = day.steps[state.currentStep];
  const total = day.steps.length;

  document.getElementById('lesson-header-title').textContent = `День ${day.id}: ${day.title}`;
  document.getElementById('lesson-header-sub').textContent = `Шаг ${state.currentStep+1} из ${total}`;
  document.getElementById('prog-label').textContent = `Шаг ${state.currentStep+1} из ${total}`;
  document.getElementById('prog-pct').textContent = Math.round((state.currentStep+1)/total*100)+'%';
  document.getElementById('prog-fill').style.width = Math.round((state.currentStep+1)/total*100)+'%';

  const content = document.getElementById('lesson-content');
  content.innerHTML = buildStep(step, state.currentStep);
  document.getElementById('lesson-scroll').scrollTop=0;

  const btnNext = document.getElementById('btn-next');
  const btnPrev = document.getElementById('btn-prev');
  const isLast = state.currentStep >= total-1;
  btnNext.textContent = isLast ? '✅ Завершить день' : 'Далее →';
  btnNext.disabled = step.type==='task' && !state.feedbackGiven[state.currentStep];
  btnPrev.style.display = state.currentStep===0 ? 'none' : 'block';

  if(step.type==='task'){
    setTimeout(()=>{
      const ta = document.getElementById('task-input');
      const btn = document.getElementById('check-btn');
      if(ta&&btn){
        ta.addEventListener('input',()=>{btn.disabled=ta.value.trim().length<30});
        btn.addEventListener('click',()=>runFeedback(ta.value.trim(), step, state.currentStep));
      }
    },50);
  }
  if(step.type==='prompt'||step.type==='compare'){
    setTimeout(()=>{
      document.querySelectorAll('.copy-btn').forEach(b=>{
        b.addEventListener('click',()=>{
          const txt = b.closest('.prompt-box').querySelector('.prompt-text').textContent;
          navigator.clipboard?.writeText(txt).then(()=>{b.textContent='✓ Скопировано!';setTimeout(()=>b.textContent='📋 Копировать',1800)});
        });
      });
    },50);
  }
}

function buildStep(step, idx){
  if(step.type==='theory') return buildTheory(step);
  if(step.type==='compare') return buildCompare(step);
  if(step.type==='prompt') return buildPrompt(step);
  if(step.type==='example') return buildExample(step);
  if(step.type==='task') return buildTask(step, idx);
  return '';
}

function buildTheory(s){
  return `<div class="lesson-step visible">
    <div class="step-tag tag-theory">📖 Теория</div>
    <div class="step-title">${s.title}</div>
    <div class="step-body">${s.content}</div>
  </div>`;
}

function buildCompare(s){
  const rows = s.table.slice(1).map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');
  const header = s.table[0].map(h=>`<th>${h}</th>`).join('');
  return `<div class="lesson-step visible">
    <div class="step-tag tag-theory">⚖️ Сравнение</div>
    <div class="step-title">${s.title}</div>
    <div class="step-body">${s.content}</div>
    <div style="overflow-x:auto"><table class="compare"><thead><tr>${header}</tr></thead><tbody>${rows}</tbody></table></div>
    ${s.afterContent||''}
  </div>`;
}

function buildPrompt(s){
  return `<div class="lesson-step visible">
    <div class="step-tag tag-prompt">🔮 Промт-шаблон</div>
    <div class="step-title">${s.title}</div>
    <div class="prompt-box">
      <div class="prompt-label">📋 Промт для Claude / ChatGPT <button class="copy-btn">📋 Копировать</button></div>
      <div class="prompt-text">${escHtml(s.prompt)}</div>
    </div>
    <div class="info-card"><div class="info-card-title">💡 Как использовать</div><div class="info-card-text">${s.note}</div></div>
  </div>`;
}

function buildExample(s){
  const msgs = s.msgs.map(m=>`
    <div class="example-role ${m.role==='user'?'role-user':'role-ai'}">${m.role==='user'?'👤 Адвокат':'🤖 Claude / ChatGPT'}</div>
    <div class="example-msg ${m.role==='user'?'msg-user':'msg-ai'}">${escHtml(m.text).replace(/\n/g,'<br>')}</div>
  `).join('');
  return `<div class="lesson-step visible">
    <div class="step-tag tag-example">💬 Пример диалога</div>
    <div class="step-title">${s.title}</div>
    <div class="example-box">
      <div class="example-q">🎯 Реальный диалог с ИИ</div>
      ${msgs}
    </div>
  </div>`;
}

function buildTask(s, idx){
  const fb = state.feedbackGiven[idx];
  return `<div class="lesson-step visible">
    <div class="step-tag tag-task">✍️ Практика</div>
    <div class="step-title">${s.title}</div>
    <div class="task-box">
      <div class="task-q">${s.question}</div>
      <div class="task-hint">💡 ${s.hint}</div>
      <textarea class="task-input" id="task-input" placeholder="Напишите ваш промт здесь...">${fb?fb.answer:''}</textarea>
      <button class="check-btn" id="check-btn" ${fb?'disabled':''}>
        ${fb?'✅ Оценка получена':'🤖 Получить обратную связь от ИИ'}
      </button>
    </div>
    <div class="feedback-box ${fb?'show':''}" id="feedback-box">
      ${fb?renderFeedbackHtml(fb):''}
    </div>
  </div>`;
}

function renderFeedbackHtml(fb){
  const scores = {great:{emoji:'🏆',label:'Отлично!',cls:'score-great'},ok:{emoji:'👍',label:'Хорошо',cls:'score-ok'},low:{emoji:'💪',label:'Можно лучше',cls:'score-low'}};
  const s = scores[fb.level];
  return `<div class="feedback-score">
    <div class="score-circle ${s.cls}">${s.emoji}</div>
    <div><div class="score-label">${s.label}</div><div style="font-size:12px;color:var(--muted)">Оценка вашего промта</div></div>
  </div>
  <div class="feedback-text">${fb.comment.replace(/\n/g,'<br>')}</div>
  ${fb.improved?`<div class="improvement-box"><div class="improvement-title">💡 Образцовый промт</div><div class="improvement-text" style="font-size:12px;white-space:pre-wrap;font-family:'Courier New',monospace">${escHtml(fb.improved)}</div></div>`:''}`;
}

// ─────────────────────────────────────────────────────────────────
// AI FEEDBACK
// ─────────────────────────────────────────────────────────────────
async function runFeedback(answer, step, stepIdx){
  const btn = document.getElementById('check-btn');
  const fb = document.getElementById('feedback-box');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span> Анализирую...';
  fb.classList.add('show');
  fb.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0">🤖 ИИ анализирует ваш промт...</div>';

  const sysPrompt = `Ты — эксперт по обучению юристов работе с ИИ. Твоя задача — дать краткую, конкретную обратную связь на промт, написанный адвокатом по ДТП в Казахстане.

Критерии хорошего промта (${step.rubric.great}).

Ответ СТРОГО в формате JSON:
{
  "level": "great" | "ok" | "low",
  "comment": "2-3 предложения конкретного фидбека на русском",
  "improved": "улучшенная версия промта (если level не great, иначе null)"
}

Будь кратким, конкретным, доброжелательным. Не повторяй промт целиком.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:600,
        system: sysPrompt,
        messages:[{role:'user',content:`Промт адвоката:\n\n${answer}\n\nОбразцовый промт для сравнения:\n${step.ideal}`}]
      })
    });
    const data = await resp.json();
    const raw = data.content[0].text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(raw);
    state.feedbackGiven[stepIdx] = {answer, level:parsed.level, comment:parsed.comment, improved:parsed.improved};
    fb.innerHTML = renderFeedbackHtml(state.feedbackGiven[stepIdx]);
    document.getElementById('btn-next').disabled = false;
    btn.textContent = '✅ Оценка получена';
  } catch(e) {
    const level = scoreFallback(answer, step);
    state.feedbackGiven[stepIdx] = {answer, level, comment: getFallbackComment(level, step), improved: level!=='great'?step.ideal:null};
    fb.innerHTML = renderFeedbackHtml(state.feedbackGiven[stepIdx]);
    document.getElementById('btn-next').disabled = false;
    btn.textContent = '✅ Оценка получена';
  }
}

function scoreFallback(ans, step){
  const a = ans.toLowerCase();
  const keys = step.rubric.great.toLowerCase().split(',').map(s=>s.trim());
  const hits = keys.filter(k=>a.includes(k.split(' ')[0])).length;
  if(hits >= keys.length * .6) return 'great';
  if(hits >= keys.length * .3) return 'ok';
  return 'low';
}

function getFallbackComment(level, step){
  if(level==='great') return 'Отличный промт! Вы включили все ключевые элементы: роль, контекст, конкретную задачу и требуемый формат. Такой запрос даст максимально точный результат.';
  if(level==='ok') return `Хорошее начало! Промт содержит нужный контекст, но можно усилить: ${step.rubric.ok}. Добавьте эти элементы для лучшего результата.`;
  return `Промт нуждается в доработке. ${step.rubric.low}. Попробуйте добавить роль ИИ, конкретные обстоятельства дела и точную формулировку задачи.`;
}

// ─────────────────────────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────────────────────────
document.getElementById('btn-next').addEventListener('click',()=>{
  const day = state.currentDay;
  const total = day.steps.length;
  if(state.currentStep < total-1){
    state.currentStep++;
    const done = Math.max(state.progress[day.id]||0, state.currentStep);
    state.progress[day.id] = done;
    saveProgress();
    renderStep();
  } else {
    state.progress[day.id] = total;
    saveProgress();
    renderHome();
    showCelebration(day);
  }
});

document.getElementById('btn-prev').addEventListener('click',()=>{
  if(state.currentStep>0){state.currentStep--;renderStep();}
});

document.getElementById('btn-back').addEventListener('click',()=>{
  renderHome();
});

function showCelebration(day){
  if(day.id===5){
    setTimeout(()=>{
      if(window.Telegram?.WebApp) window.Telegram.WebApp.showAlert('🎉 Поздравляем! Вы прошли полный курс! Теперь вы умеете использовать ИИ в практике адвоката по ДТП.');
      else alert('🎉 Курс завершён! Вы освоили ИИ-инструменты для практики адвоката по ДТП.');
    },300);
  }
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();
}

// ─────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────
renderHome();
</script>
