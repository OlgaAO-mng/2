<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека курсов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f1117; color: #f0f2ff; font-family: sans-serif; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; }
        .card { background: #1a1d27; padding: 20px; border-radius: 14px; margin-bottom: 15px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .card:active { background: #22263a; }
    </style>
</head>
<body>
    <h1>📚 Мои курсы</h1>
    <div class="card" onclick="location.href='dtp/index.html'">
        <h3>ИИ для адвоката по ДТП</h3>
        <p style="color: #888;">Практический курс</p>
    </div>
    
    <script>
        if(window.Telegram?.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
    </script>
</body>
</html>
